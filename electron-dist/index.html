        function animatePieValue(targetPercent) {
            const valueElement = document.getElementById('pieRingValue');
            if (!valueElement) return;
            const target = Math.max(0, Math.min(100, Number(targetPercent) || 0));
            const duration = 1100;
            const start = performance.now();
            const easeOut = t => 1 - Math.pow(1 - t, 3);

            function frame(now) {
                const progress = Math.min((now - start) / duration, 1);
                const eased = easeOut(progress);
                valueElement.textContent = `${Math.round(target * eased)}%`;
                if (progress < 1) {
                    requestAnimationFrame(frame);
                }
            }

            valueElement.textContent = '0%';
            requestAnimationFrame(frame);
        }

        function animatePieRing(percent) {
            const pieRing = document.getElementById('pieRing');
            const valueElement = document.getElementById('pieRingValue');
            if (!pieRing || !valueElement) return;

            const target = Math.max(0, Math.min(100, Number(percent) || 0));
            const duration = 1450;
            const start = performance.now();
            const easeInOut = t => t < 0.5
                ? 4 * t * t * t
                : 1 - Math.pow(-2 * t + 2, 3) / 2;

            setPieRingProgress(pieRing, 0);
            valueElement.textContent = '0%';

            function frame(now) {
                const progress = Math.min((now - start) / duration, 1);
                const eased = easeInOut(progress);
                const current = target * eased;
                setPieRingProgress(pieRing, current);
                valueElement.textContent = `${Math.round(current)}%`;
                if (progress < 1) {
                    requestAnimationFrame(frame);
                } else {
                    setPieRingProgress(pieRing, target);
                    valueElement.textContent = `${Math.round(target)}%`;
                }
            }

            requestAnimationFrame(frame);
        }

        function getClosestAvailableDateKey(targetDateKey) {
            const availableDates = (currentCalendarIndex?.available_dates || []).map(String).sort();
            if (!availableDates.length) {
                return null;
            }

            if (!targetDateKey || availableDates.includes(targetDateKey)) {
                return targetDateKey || availableDates[availableDates.length - 1];
            }

            const targetTime = parseDateKey(targetDateKey).getTime();
            let closestDate = availableDates[0];
            let closestDistance = Math.abs(parseDateKey(closestDate).getTime() - targetTime);

            availableDates.forEach(dateKey => {
                const distance = Math.abs(parseDateKey(dateKey).getTime() - targetTime);
                if (distance < closestDistance) {
                    closestDate = dateKey;
                    closestDistance = distance;
                }
            });

            return closestDate;
        }

        async function loadDashboardData(options = {}) {
            const { generateReport = false } = options;
            const shouldGenerate = currentTab === 'day' && generateReport;
            const requestedDateKey = formatDateKey(currentDate);

            if (currentTab === 'day' && !shouldGenerate) {
                currentDashboard = null;
                updateGenerateReportButton(false);
            }

            async function requestDashboard(dateKey) {
                const params = new URLSearchParams();
                if (currentUserId) {
                    params.set('user_id', currentUserId);
                }
                params.set('date', dateKey);
                params.set('period', currentTab);
                if (shouldGenerate) {
                    params.set('generate_report', '1');
                }

                const url = `${API_BASE}/daily_dashboard?${params.toString()}`;
                const response = await fetch(url);
                if (!response.ok) {
                  if (response.status === 404) {
                    throw new Error("无数据");
                  }
                  throw new Error("数据读取失败");
                }
                return response.json();
            }

            try {
                let data;
                try {
                    data = await requestDashboard(requestedDateKey);
                } catch (error) {
                    const fallbackDateKey = getClosestAvailableDateKey(requestedDateKey);
                    const shouldRetry = currentTab === 'week' && fallbackDateKey && fallbackDateKey !== requestedDateKey;
                    if (!shouldRetry) {
                        throw error;
                    }
                    data = await requestDashboard(fallbackDateKey);
                }
                applyDashboard(data);
                if (currentTab === 'day') {
                    setDailyReportReady(!!data.ai_stress_analysis);
                }
                currentRangeLabel = data.range_label || null;
                currentDate = parseDateKey(data.date || requestedDateKey);
                updateDateDisplay();
                return true;
            } catch (error) {
                currentRangeLabel = currentTab === 'week' ? formatWeekRangeLabel(currentDate) : formatDate(currentDate);
                console.error('dashboard load failed:', error);
                const prefix = currentTab === 'week' ? '本周数据读取失败' : '每日数据读取失败';
                const detail = error && error.message ? `：${String(error.message).replace(/^Error:\s*/, '')}` : '';
                renderDashboardError(`${prefix}${detail}`);
                loadDailyTaskForCurrentDate();
                updateDateDisplay();
                return false;
            }
        }

        }

        function populateYearMonthSelectors() {
            const yearSelect = document.getElementById('yearSelect');
            const monthSelect = document.getElementById('monthSelect');
            if (!yearSelect || !monthSelect) return;

            const currentYear = currentDate.getFullYear();
            const currentMonth = currentDate.getMonth() + 1;
            const todayYear = today.getFullYear();
            const todayMonth = today.getMonth() + 1;
            const yearStart = 2010;
            const yearEnd = todayYear;

            if (!yearSelect.dataset.ready) {
                yearSelect.innerHTML = '';
                for (let year = yearStart; year <= yearEnd; year++) {
                    const option = document.createElement('option');
                    option.value = String(year);
                    option.textContent = `${year}年`;
                    yearSelect.appendChild(option);
                }
                yearSelect.dataset.ready = '1';
            }

            if (!monthSelect.dataset.ready) {
                monthSelect.innerHTML = '';
                for (let month = 1; month <= 12; month++) {
                    const option = document.createElement('option');
                    option.value = String(month);
                    option.textContent = `${month.toString().padStart(2, '0')}月`;
                    monthSelect.appendChild(option);
                }
                monthSelect.dataset.ready = '1';
            }

            Array.from(monthSelect.options).forEach(option => {
                const monthValue = Number(option.value);
                const shouldDisable = currentYear === todayYear && monthValue > todayMonth;
                option.disabled = shouldDisable;
                option.hidden = shouldDisable;
            });

            if (currentYear === todayYear && currentMonth > todayMonth) {
                currentDate = new Date(todayYear, todayMonth - 1, Math.min(currentDate.getDate(), new Date(todayYear, todayMonth, 0).getDate()));
            }

            yearSelect.value = String(currentYear);
            monthSelect.value = String(Math.min(currentDate.getMonth() + 1, currentYear === todayYear ? todayMonth : currentMonth));
            updateMonthSelectMarks();
        }

        const FOCUS_TIME = 25 * 60;
        const SHORT_BREAK_TIME = 5 * 60;
        const LONG_BREAK_TIME = 15 * 60;
        const LONG_BREAK_INTERVAL = 4;
        const CIRCLE_RADIUS = 50;
        const CIRCLE_CIRCUMFERENCE = 2 * Math.PI * CIRCLE_RADIUS;

        let currentPhase = 'focus';
        let completedFocusSessions = 0;
        let timeLeft = FOCUS_TIME;
        let isRunning = false;
        let timerInterval = null;

        const timeDisplay = document.getElementById('timeDisplay');
        const progressCircle = document.getElementById('progressCircle');
        const btnContainer = document.getElementById('btnContainer');
        const pomodoroHint = document.getElementById('pomodoroHint');
        const timerGradientStopStart = document.getElementById('timerGradientStopStart');
        const timerGradientStopMid = document.getElementById('timerGradientStopMid');
        const timerGradientStopEnd = document.getElementById('timerGradientStopEnd');

        progressCircle.style.strokeDasharray = CIRCLE_CIRCUMFERENCE;
        progressCircle.style.strokeDashoffset = 0;

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function getPhaseDuration(phase = currentPhase) {
            if (phase === 'shortBreak') return SHORT_BREAK_TIME;
            if (phase === 'longBreak') return LONG_BREAK_TIME;
            return FOCUS_TIME;
        }

        function getPhaseLabel(phase = currentPhase) {
            if (phase === 'shortBreak') return '短休息';
            if (phase === 'longBreak') return '长休息';
            return '专注';
        }

        function getNextBreakPhase() {
            const nextCompleted = completedFocusSessions + 1;
            return nextCompleted % LONG_BREAK_INTERVAL === 0 ? 'longBreak' : 'shortBreak';
        }

        function isBreakPhase(phase = currentPhase) {
            return phase === 'shortBreak' || phase === 'longBreak';
        }

        function getTimerButtonClass() {
            return isBreakPhase() ? 'btn btn-break' : 'btn';
        }

        function updateTimerTheme() {
            if (!timerGradientStopStart || !timerGradientStopMid || !timerGradientStopEnd) return;

            if (isBreakPhase()) {
                timerGradientStopStart.setAttribute('stop-color', '#c7eed6');
                timerGradientStopMid.setAttribute('stop-color', '#97d6b0');
                timerGradientStopEnd.setAttribute('stop-color', '#72bc90');
                if (pomodoroHint) {
                    pomodoroHint.style.color = '#8cb79b';
                }
                return;
            }

            timerGradientStopStart.setAttribute('stop-color', '#c6a8ff');
            timerGradientStopMid.setAttribute('stop-color', '#9a6df0');
            timerGradientStopEnd.setAttribute('stop-color', '#6d49b4');
            if (pomodoroHint) {
                pomodoroHint.style.color = '#aaa';
            }
        }

        function updateDisplay() {
            timeDisplay.textContent = formatTime(timeLeft);
            const progress = timeLeft / getPhaseDuration();
            const offset = CIRCLE_CIRCUMFERENCE * (1 - progress);
            progressCircle.style.strokeDashoffset = offset;
        }

        function updatePomodoroHint() {
            if (!pomodoroHint) return;
            if (currentPhase === 'shortBreak') {
                pomodoroHint.textContent = '短休息 5 分钟';
                return;
            }
            if (currentPhase === 'longBreak') {
                pomodoroHint.textContent = '长休息 15 分钟';
                return;
            }
            const completed = Number(currentTodayPomodoroCount || 0);
            const nextIndex = Math.max(1, completed + 1);
            pomodoroHint.textContent = `今天第 ${nextIndex} 个番茄钟`;
        }

        function applyPhase(phase, nextTimeLeft = null) {
            currentPhase = phase;
            timeLeft = nextTimeLeft ?? getPhaseDuration(phase);
            updateDisplay();
            updatePomodoroHint();
            updateTimerTheme();
        }

        function updateStatusText(customText = '') {
            return;
        }

        async function loadTodayPomodoroCount() {
            if (!currentUserId) {
                currentTodayPomodoroCount = null;
                updatePomodoroHint();
                return;
            }

            const todayKey = formatDateKey(today);
            const params = new URLSearchParams();
            params.set('user_id', currentUserId);
            params.set('date', todayKey);
            params.set('period', 'day');

            try {
                const response = await fetch(`${API_BASE}/daily_dashboard?${params.toString()}`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                currentTodayPomodoroCount = Number(data.study_count || 0);
            } catch (error) {
                currentTodayPomodoroCount = 0;
            }
            updatePomodoroHint();
        }

        function showRunningButtons() {
            const buttonClass = getTimerButtonClass();
            btnContainer.innerHTML = `
                <button class="${buttonClass}" onclick="pauseTimer()"><span class="btn-icon pause">||</span></button>
                <button class="${buttonClass}" onclick="skipTimerPhase()"><span class="btn-icon skip">⏭</span></button>
                <button class="${buttonClass}" onclick="restartTimer()"><span class="btn-icon reset">↺</span></button>
            `;
        }

        function showPausedButtons() {
            const buttonClass = getTimerButtonClass();
            btnContainer.innerHTML = `
                <button class="${buttonClass}" onclick="resumeTimer()"><span class="btn-icon play">▶</span></button>
                <button class="${buttonClass}" onclick="skipTimerPhase()"><span class="btn-icon skip">⏭</span></button>
                <button class="${buttonClass}" onclick="restartTimer()"><span class="btn-icon reset">↺</span></button>
            `;
        }

        function showStartButton() {
            const buttonClass = getTimerButtonClass();
            btnContainer.innerHTML = `
                <button class="${buttonClass}" onclick="toggleTimer()"><span class="btn-icon play">▶</span></button>
                <button class="${buttonClass}" onclick="skipTimerPhase()"><span class="btn-icon skip">⏭</span></button>
            `;
        }

        function finishCurrentPhase() {
            clearInterval(timerInterval);
            timerInterval = null;
            isRunning = false;
            timeLeft = 0;
            updateDisplay();

            if (currentPhase === 'focus') {
                completedFocusSessions += 1;
                currentTodayPomodoroCount = Number(currentTodayPomodoroCount || 0) + 1;
                applyPhase(getNextBreakPhase());
                showStartButton();
                updateStatusText(currentPhase === 'longBreak' ? '做得很好，开始长休息' : '专注完成，休息一下');
                return;
            }

            applyPhase('focus');
            showStartButton();
            updateStatusText('休息结束，准备进入下一轮专注');
        }

        function skipTimerPhase() {
            finishCurrentPhase();
        }

        function toggleTimer() {
            if (timeLeft === 0) timeLeft = getPhaseDuration();
            isRunning = true;
            updateStatusText();
            showRunningButtons();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    finishCurrentPhase();
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            isRunning = false;
            showPausedButtons();
        }

        function resumeTimer() {
            isRunning = true;
            updateStatusText();
            showRunningButtons();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    finishCurrentPhase();
                }
            }, 1000);
        }

        function restartTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            isRunning = false;
            applyPhase('focus');
            showStartButton();
            updateStatusText();
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            isRunning = false;
            applyPhase('focus');
            completedFocusSessions = 0;
            showStartButton();
            updateStatusText();
        }

        updateDisplay();
        updateTimerTheme();
        handleResize();
        populateYearMonthSelectors();
        updateDateDisplay();

        const savedUserId = localStorage.getItem('focus_user_id');
        if (savedUserId) {
            currentUserId = savedUserId;
            showMainPage();
            loadTodayPomodoroCount();
            loadDailyReportReady();
            loadDailyTaskForCurrentDate();
            loadAiPreferenceForCurrentUser();
            updateAiTitle();
            loadCalendarIndex().then(loadDashboardData);
        } else {
            showLoginPage();
            loadLoginUserList();
        }

        async function loadLoginUserList() {
            const select = document.getElementById('loginUserSelect');
            try {
                const response = await fetch(`${API_BASE}/users`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const users = await response.json();
                select.innerHTML = users.map(user => `<option value="${user}">${user}</option>`).join('');
                if (users.length > 0) {
                    select.value = users[0];
                }
            } catch (error) {
                select.innerHTML = '<option value="">暂无用户</option>';
            }
        }

        function syncAiPreferenceInput(value) {
            const input = document.getElementById('aiPreferenceInput');
            const hint = document.getElementById('aiPreferenceHint');
            currentAiPreference = value || '';
            if (input && input.value !== currentAiPreference) {
                input.value = currentAiPreference;
            }
            if (hint) {
                hint.textContent = currentAiPreference
                    ? '这句话会跟着当前用户一起记住'
                    : '会记住当前用户的偏好';
            }
        }

        async function loadAiPreferenceForCurrentUser() {
            const input = document.getElementById('aiPreferenceInput');
            const hint = document.getElementById('aiPreferenceHint');
            if (!input || !currentUserId) {
                syncAiPreferenceInput('');
                return;
            }

            try {
                const params = new URLSearchParams();
                params.set('user_id', currentUserId);
                const response = await fetch(`${API_BASE}/user_ai_preference?${params.toString()}`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                syncAiPreferenceInput(data.preference_text || '');
            } catch (error) {
                syncAiPreferenceInput('');
                if (hint) {
                    hint.textContent = '暂时读取不到偏好，先直接输入也可以';
                }
            }
        }

        function syncDailyTaskInput(value) {
            const input = document.getElementById('dailyTaskInput');
            const hint = document.getElementById('dailyTaskHint');
            currentDailyTask = value || '';
            if (input && input.value !== currentDailyTask) {
                input.value = currentDailyTask;
            }
            if (hint) {
                hint.textContent = currentDailyTask
                    ? '这一天的任务会一起记住'
                    : '会和今天的分析一起记住';
            }
        }

        async function loadDailyTaskForCurrentDate() {
            const input = document.getElementById('dailyTaskInput');
            const hint = document.getElementById('dailyTaskHint');
            if (!input || !currentUserId) {
                syncDailyTaskInput('');
                return;
            }

            try {
                const params = new URLSearchParams();
                params.set('user_id', currentUserId);
                params.set('task_date', formatDateKey(currentDate));
                const response = await fetch(`${API_BASE}/user_daily_task?${params.toString()}`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                syncDailyTaskInput(data.task_text || '');
            } catch (error) {
                syncDailyTaskInput('');
                if (hint) {
                    hint.textContent = '暂时读取不到任务，先直接输入也可以';
                }
            }
        }

        function handleDailyTaskInput() {
            const input = document.getElementById('dailyTaskInput');
            if (!input) return;
            currentDailyTask = input.value || '';
            const hint = document.getElementById('dailyTaskHint');
            if (hint) {
                hint.textContent = currentDailyTask
                    ? '正在保存这一天的任务'
                    : '会和今天的分析一起记住';
            }

            setDailyReportReady(false);
            currentDailyReportGenerating = false;
            updateGenerateReportButton(false);

            if (!currentUserId) return;
            if (dailyTaskSaveTimer) {
                clearTimeout(dailyTaskSaveTimer);
            }
            dailyTaskSaveTimer = setTimeout(() => {
                saveDailyTask(currentDailyTask, { refreshDashboard: false });
            }, 500);
        }

        async function saveDailyTask(taskText, options = {}) {
            const { refreshDashboard = true } = options;
            if (!currentUserId) return;
            try {
                const response = await fetch(`${API_BASE}/user_daily_task`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: currentUserId,
                        task_date: formatDateKey(currentDate),
                        task_text: taskText || '',
                    }),
                });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const hint = document.getElementById('dailyTaskHint');
                if (hint) {
                    hint.textContent = taskText
                        ? '已记住这一天的任务'
                        : '会和今天的分析一起记住';
                }
                if (refreshDashboard) {
                    loadDashboardData();
                }
            } catch (error) {
                const hint = document.getElementById('dailyTaskHint');
                if (hint) {
                    hint.textContent = '保存失败了，但还能继续用';
                }
            }
        }

        async function generateDailyReport() {
            if (!currentUserId) return;
            if (!hasDashboardData()) {
                const hint = document.getElementById('dailyTaskHint');
                if (hint) {
                    hint.textContent = '当天没有数据，无法生成每日报告';
                }
                updateGenerateReportButton(false);
                return;
            }
            const taskText = (currentDailyTask || '').trim();
            if (!taskText) {
                const hint = document.getElementById('dailyTaskHint');
                if (hint) {
                    hint.textContent = '先写今天任务，再点生成每日报告';
                }
                return;
            }

            currentDailyReportGenerating = true;
            updateGenerateReportButton(true);
            setDailyReportReady(false);

            try {
                // Yield one frame so the disabled style/text can paint before network work starts.
                await new Promise(resolve => requestAnimationFrame(resolve));
                await saveDailyTask(taskText, { refreshDashboard: false });
                const success = await loadDashboardData({ generateReport: true });

                // 只有真的有AI结果才标记
                const hasReport = currentDashboard && currentDashboard.ai_stress_analysis;

                setDailyReportReady(!!hasReport);
            } finally {
                currentDailyReportGenerating = false;
                updateGenerateReportButton(false);
                renderAiAnalysis(currentDashboard);
            }
        }

        function handleAiPreferenceInput() {
            const input = document.getElementById('aiPreferenceInput');
            if (!input) return;
            currentAiPreference = input.value || '';
            const hint = document.getElementById('aiPreferenceHint');
            if (hint) {
                hint.textContent = currentAiPreference
                    ? '正在保存这句话到当前用户'
                    : '会记住当前用户的偏好';
            }

            if (!currentUserId) return;
            if (aiPreferenceSaveTimer) {
                clearTimeout(aiPreferenceSaveTimer);
            }
            aiPreferenceSaveTimer = setTimeout(() => {
                saveAiPreference(currentAiPreference);
            }, 500);
        }

        function handleAiPreferenceKeydown(event) {
            if (!event) return;
            if (event.key !== 'Enter' || event.shiftKey) {
                return;
            }

            event.preventDefault();
            const input = document.getElementById('aiPreferenceInput');
            if (!input) return;

            const preferenceText = input.value || '';
            if (aiPreferenceSaveTimer) {
                clearTimeout(aiPreferenceSaveTimer);
                aiPreferenceSaveTimer = null;
            }

            saveAiPreference(preferenceText);
            input.value = '';
            currentAiPreference = '';
            const hint = document.getElementById('aiPreferenceHint');
            if (hint) {
                hint.textContent = preferenceText
                    ? '已记住当前用户的偏好'
                    : '会记住当前用户的偏好';
            }
            closeAiPreferencePanel();
        }

        async function saveAiPreference(preferenceText) {
            if (!currentUserId) return;
            try {
                const response = await fetch(`${API_BASE}/user_ai_preference`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: currentUserId,
                        preference_text: preferenceText || '',
                    }),
                });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const hint = document.getElementById('aiPreferenceHint');
                if (hint) {
                    hint.textContent = preferenceText
                        ? '已记住当前用户的这句话'
                        : '会记住当前用户的偏好';
                }
            } catch (error) {
                const hint = document.getElementById('aiPreferenceHint');
                if (hint) {
                    hint.textContent = '保存失败了，但还能继续用';
                }
            }
        }

        if (typeof require !== 'undefined') {
            try {
                const { ipcRenderer } = require('electron');
                ipcRenderer.on('reset-timer', () => resetTimer());
            } catch (e) {}
        }
    </script>
</body>
</html>
