<!DOCTYPE html>
<html lang="zh-CN" style="background: transparent;">
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        :root {
            --app-width: 210px;
            --app-height: 300px;
            --primary-solid: #764ba2;
            --primary-deep: #5f3fa8;
            --primary-soft: #b99cf7;
            --primary-gradient: linear-gradient(135deg, #b08cf5 0%, #8b63dc 45%, #6d49b4 100%);
            --primary-gradient-soft: linear-gradient(135deg, rgba(176, 140, 245, 0.95) 0%, rgba(139, 99, 220, 0.95) 55%, rgba(109, 73, 180, 0.95) 100%);
            --break-solid: #7fbf98;
            --break-deep: #66a983;
            --break-soft: #c5edd5;
            --break-gradient: linear-gradient(135deg, #c7eed6 0%, #97d6b0 48%, #72bc90 100%);
        }

        html, body {
            background: transparent !important;
            margin: 0 !important;
            padding: 0 !important;
            border: none !important;
            overflow: hidden !important;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Microsoft YaHei', -apple-system, sans-serif;
            position: relative;
        }

        html {
            background: transparent;
        }

        .window-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            will-change: transform;
        }

        .content-wrapper {
            position: relative;
            width: var(--app-width);
            height: var(--app-height);
            overflow: hidden;
            clip-path: inset(0);
            -webkit-app-region: drag;
            transform-origin: center center;
        }

        .content-wrapper button,
        .content-wrapper input,
        .content-wrapper select,
        .content-wrapper .icon-btn,
        .content-wrapper .tab-btn,
        .content-wrapper .date-btn,
        .content-wrapper .close-btn,
        .content-wrapper .stats-back,
        .content-wrapper .view-detail,
        .content-wrapper .pie-back,
        .content-wrapper .btn-container,
        .content-wrapper .bottom-bar,
        .content-wrapper .ai-preference-body,
        .content-wrapper .ai-preference-modal,
        .content-wrapper .ai-preference-input,
        .content-wrapper .ai-preference-hint {
            -webkit-app-region: no-drag;
        }

        .bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: var(--app-width);
            height: var(--app-height);
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: var(--app-width);
            height: var(--app-height);
            border-radius: 30px;
            overflow: hidden;
            will-change: left;
            background: rgba(255, 255, 255, 0.7);
            opacity: 1;
            transform: translateX(0) scale(1);
            transition:
                left 340ms cubic-bezier(0.2, 0.82, 0.24, 1),
                transform 340ms cubic-bezier(0.2, 0.82, 0.24, 1),
                opacity 280ms ease;
        }

        .page.is-offscreen-left {
            opacity: 0.82;
            transform: translateX(-8px) scale(0.985);
        }

        .page.is-offscreen-right {
            opacity: 0.82;
            transform: translateX(8px) scale(0.985);
        }

        .page-inner {
            width: var(--app-width);
            height: var(--app-height);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 12px 8px;
            width: 100%;
            height: 100%;
        }

        .close-btn {
            position: absolute;
            top: 3px;
            right: 15px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            color: #555;
            font-size: 14px;
            z-index: 100;
        }

        .task-input {
            width: 150px;
            font-size: 10px;
            text-align: center;
            border: none;
            background: transparent;
            color: #222;
            outline: none;
            margin: 8px auto;
        }

        .task-input::placeholder {
            color: #666;
        }

        .timer-container {
            position: relative;
            width: 154px;
            height: 154px;
            margin: 6px auto 10px;
            flex-shrink: 0;
        }

        .circle-progress {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
            transform-origin: center center;
            display: block;
            overflow: visible;
        }

        .circle-progress circle {
            fill: none;
            stroke: url(#timerGradient);
            stroke-width: 6;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear;
        }

        .time-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4.8ch;
            color: #222;
            font-size: 32px;
            font-weight: 400;
            line-height: 1;
            white-space: nowrap;
            text-align: center;
            font-family: "SF Mono", "SFMono-Regular", "Menlo", "Monaco", "Consolas", monospace;
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum" 1;
            z-index: 2;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 4px;
            position: relative;
            z-index: 100;
            flex-shrink: 0;
        }

        .btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-gradient);
            box-shadow: 0 6px 14px rgba(118, 75, 162, 0.24);
            color: white;
        }

        .btn-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1em;
            line-height: 1;
            font-size: 17px;
            transform: translateY(-0.5px);
        }

        .btn-icon.skip {
            font-size: 15px;
        }

        .btn-icon.reset {
            font-size: 16px;
        }

        .btn-icon.pause {
            font-size: 14px;
            letter-spacing: -0.08em;
        }

        .btn.btn-break {
            background: var(--break-gradient);
            box-shadow: 0 6px 14px rgba(114, 188, 144, 0.24);
        }

        .pomodoro-hint {
            color: #aaa;
            font-size: 8px;
            margin-top: 4px;
            text-align: center;
            width: 100%;
            line-height: 1.2;
            flex-shrink: 0;
        }

        .ai-preference-wrap {
            width: 178px;
            margin-top: 4px;
            flex-shrink: 0;
        }

        .ai-preference-toggle {
            width: 100%;
            border: none;
            background: rgba(118, 75, 162, 0.08);
            color: #6d49b4;
            border-radius: 10px;
            font-size: 8px;
            padding: 6px 8px;
            cursor: pointer;
            text-align: left;
        }

        .ai-preference-toggle::after {
            content: "▾";
            float: right;
            color: #8b63dc;
        }

        .ai-preference-toggle.expanded::after {
            content: "▴";
        }

        .ai-preference-body {
            display: none;
            position: absolute;
            inset: 0;
            z-index: 180;
            background: rgba(255, 255, 255, 0.16);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
        }

        .ai-preference-body.open {
            display: flex;
        }

        .ai-preference-modal {
            width: 178px;
            padding: 10px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 12px 32px rgba(96, 74, 134, 0.18);
            border: 1px solid rgba(118, 75, 162, 0.12);
        }

        .ai-preference-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #6d49b4;
            font-size: 8px;
            font-weight: 600;
        }

        .ai-preference-close {
            border: none;
            background: transparent;
            color: #8b63dc;
            font-size: 10px;
            cursor: pointer;
            line-height: 1;
        }

        .generate-report-btn {
            width: 100%;
            border: none;
            border-radius: 8px;
            margin-top: 6px;
            padding: 6px 8px;
            font-size: 8px;
            color: #fff;
            background: var(--primary-gradient);
            box-shadow: 0 4px 10px rgba(118, 75, 162, 0.18);
            cursor: pointer;
        }

        .generate-report-btn.is-generating,
        .generate-report-btn:disabled {
            background: linear-gradient(135deg, #cfc8db 0%, #b8b1c6 100%) !important;
            box-shadow: none !important;
            color: rgba(255, 255, 255, 0.95);
            cursor: not-allowed;
            opacity: 1;
            filter: grayscale(0.15);
        }

        .completed {
            color: #4CAF50;
            font-size: 10px;
            font-weight: 600;
            text-align: center;
        }

        .bottom-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 15px;
            margin-top: auto;
            margin-bottom: 8px;
        }

        .logout-btn {
            border: none;
            background: transparent;
            color: #8b7ea8;
            font-size: 8px;
            cursor: pointer;
            padding: 0;
        }

        .icon-btn {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            color: #555;
            font-size: 10px;
        }

        .login-page .page-inner {
            overflow: hidden;
        }

        .login-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            width: 100%;
            height: 100%;
            padding: 28px 24px 24px;
        }

        .login-mark {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
        }

        .login-mark img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            image-rendering: -webkit-optimize-contrast;
        }

        .login-card {
            width: 156px;
            padding: 0;
            margin-top: 2px;
        }

        .login-select-wrap {
            position: relative;
            margin-bottom: 12px;
        }

        .login-select-wrap::after {
            content: "▾";
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #7d63b3;
            font-size: 9px;
            pointer-events: none;
        }

        .login-select {
            width: 100%;
            height: 34px;
            border-radius: 13px;
            border: 1px solid rgba(118, 75, 162, 0.12);
            background: rgba(255, 255, 255, 0.72);
            color: #433465;
            font-size: 11px;
            font-weight: 600;
            padding: 0 32px 0 14px;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55);
            transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease, transform 160ms ease;
        }

        .login-select:focus {
            border-color: rgba(118, 75, 162, 0.22);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.65),
                0 0 0 3px rgba(118, 75, 162, 0.045);
            background: rgba(255, 255, 255, 0.82);
        }

        .login-button {
            width: 100%;
            height: 34px;
            border: none;
            border-radius: 999px;
            background: var(--primary-gradient-soft);
            color: #fff;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.10em;
            box-shadow:
                0 10px 22px rgba(118, 75, 162, 0.16),
                inset 0 1px 0 rgba(255, 255, 255, 0.22);
            transition: transform 180ms ease, box-shadow 220ms ease, filter 180ms ease;
        }

        .login-button:hover {
            transform: translateY(-1px);
            box-shadow:
                0 12px 24px rgba(118, 75, 162, 0.19),
                inset 0 1px 0 rgba(255, 255, 255, 0.24);
            filter: saturate(1.02);
        }

        .login-button:active {
            transform: translateY(0);
            box-shadow:
                0 7px 16px rgba(118, 75, 162, 0.16),
                inset 0 1px 0 rgba(255, 255, 255, 0.18);
        }

        /* 统计页面样式 */
        .stats-header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
            padding-top: 5px;
        }

        .stats-back {
            display: flex;
            align-items: center;
            font-size: 9px;
            color: #764ba2;
            cursor: pointer;
            margin-bottom: 15px;
            padding-top: 10px;
            padding-left: 10px;
        }

        .stats-back::before {
            content: "◀";
            margin-right: 5px;
        }

        .stats-content {
            flex: 1;
            overflow-y: scroll;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 4px 12px 0;
            pointer-events: auto;
            -webkit-app-region: no-drag;
        }
        
        .stats-content button,
        .stats-content .stat-col,
        .stats-content .stats-section,
        .stats-content select {
            -webkit-app-region: no-drag;
        }

        .stats-content::-webkit-scrollbar {
            display: none;
        }

        .tab-buttons {
            display: flex;
            gap: 6px;
            margin-top: 4px;
            margin-bottom: 12px;
            justify-content: flex-start;
            padding-left: 10px;
            padding-top: 2px;
        }

        .tab-btn {
            padding: 4px 8px;
            border: none;
            border-radius: 10px;
            background: rgba(60, 60, 67, 0.12);
            color: #666;
            font-size: 8px;
            cursor: pointer;
            transform: translateY(0);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.45);
            transition:
                background 180ms ease,
                color 180ms ease,
                box-shadow 220ms ease,
                transform 180ms ease,
                filter 180ms ease;
        }

        .tab-btn:hover {
            transform: translateY(-1px);
            filter: saturate(1.02);
        }

        .tab-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .tab-btn.active {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 8px 16px rgba(118, 75, 162, 0.16);
        }

        .date-nav {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 12px;
            gap: 8px;
        }

        .ym-nav {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 6px;
            margin-bottom: 10px;
            padding-left: 10px;
        }

        .ym-select {
            border: 1px solid rgba(118, 75, 162, 0.15);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.85);
            color: #5f4a86;
            font-size: 10px;
            padding: 5px 8px;
            outline: none;
        }

        .calendar-panel {
            margin: 4px 10px 10px;
            padding: 8px 8px 6px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.55);
            border: 1px solid rgba(118, 75, 162, 0.08);
            overflow: hidden;
        }

        .calendar-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
            flex-wrap: nowrap;
        }

        .calendar-title {
            color: #5f4a86;
            font-weight: 600;
            line-height: 1.05;
            display: flex;
            flex-direction: row;
            align-items: baseline;
            gap: 1px;
            min-width: 0;
            white-space: nowrap;
            flex-shrink: 0;
            letter-spacing: 0;
        }

        .calendar-title-year {
            font-size: 10px;
        }

        .calendar-title-month {
            font-size: 9.5px;
        }

        .calendar-legend {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 3px;
            font-size: 6.5px;
            color: #9a92ad;
            min-width: 0;
            flex: 1;
            flex-wrap: nowrap;
            overflow: hidden;
            white-space: nowrap;
        }

        .calendar-legend-item {
            display: flex;
            align-items: center;
            gap: 1px;
            white-space: nowrap;
            flex-shrink: 1;
            min-width: 0;
        }

        .calendar-legend-dot {
            width: 5px;
            height: 5px;
            min-width: 5px;
            border-radius: 50%;
            display: inline-block;
            background: rgba(118, 75, 162, 0.2);
            box-shadow: inset 0 0 0 1px rgba(118, 75, 162, 0.06);
        }

        .calendar-legend-dot.has-data {
            background: var(--primary-solid);
        }

        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            margin-bottom: 4px;
            font-size: 7px;
            color: #a69bb8;
            text-align: center;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }

        .calendar-cell {
            position: relative;
            min-height: 20px;
            border-radius: 5px;
            font-size: 8.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8e84a6;
            background: rgba(118, 75, 162, 0.05);
            cursor: default;
            user-select: none;
            transform: translateZ(0);
            transition: transform 140ms ease, box-shadow 160ms ease, background 160ms ease;
        }

        .calendar-cell.blank {
            background: transparent;
        }

        .calendar-cell.has-data {
            background: rgba(118, 75, 162, 0.12);
            color: #5f3f91;
            font-weight: 600;
            cursor: pointer;
        }

        .calendar-cell.selected {
            background: var(--primary-gradient);
            color: #fff;
        }

        .calendar-cell.has-data:active {
            transform: scale(0.98);
        }

        .calendar-cell.is-clicking {
            animation: calendarCellTap 180ms ease-out;
        }

        .calendar-cell.selected.is-clicking {
            box-shadow: 0 0 0 2px rgba(139, 99, 220, 0.10);
        }

        .calendar-cell.disabled {
            opacity: 0.35;
        }

        .calendar-cell .dot {
            position: absolute;
            bottom: 2px;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--primary-solid);
        }

        @keyframes calendarCellTap {
            0% {
                transform: scale(1);
            }
            45% {
                transform: scale(0.97);
            }
            100% {
                transform: scale(1);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .page,
            .calendar-cell,
            .calendar-cell.is-clicking {
                transition: none !important;
                animation: none !important;
            }
        }

        .date-btn {
            width: auto;
            height: auto;
            border: none;
            background: transparent;
            color: var(--primary-solid);
            cursor: pointer;
            font-size: 12px;
            padding: 2px 4px;
        }

        .date-btn.disabled {
            background: transparent;
            color: #999;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .date-text {
            font-size: 10px;
            color: #333;
            white-space: nowrap;
        }

        .focus-score-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(118, 75, 162, 0.2);
            margin-bottom: 12px;
        }

        .focus-score-label {
            font-size: 11px;
            color: #333;
        }

        .focus-score-value {
            font-size: 11px;
            color: #333;
            font-weight: bold;
        }

        .view-detail {
            font-size: 9px;
            color: #aaa;
            cursor: pointer;
        }

        .stats-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .stat-col {
            flex: 1;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            padding: 10px 5px;
            text-align: center;
        }

        .stat-col-label {
            font-size: 9px;
            color: #888;
            margin-bottom: 4px;
        }

        .stat-col-value {
            font-size: 15px;
            color: #333;
            font-weight: bold;
        }

        .stat-col-unit {
            font-size: 9px;
            color: #888;
        }

        .stats-section {
            background: rgba(118, 75, 162, 0.1);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            overflow: visible;
        }

        .section-label {
            font-size: 10px;
            color: #888;
            margin-bottom: 4px;
        }

        .section-sub-label {
            font-size: 7px;
            color: #8b7ea8;
            margin-top: -2px;
            margin-bottom: 6px;
            line-height: 1.2;
        }

        .section-placeholder {
            font-size: 10px;
            color: #aaa;
            text-align: center;
            padding: 10px;
        }

        .section-placeholder.chart-host {
            padding: 0;
            text-align: left;
            overflow: visible;
        }

        .ai-analysis-text {
            font-size: 8px;
            color: #5f4a86;
            line-height: 1.55;
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 30px;
        }

        .ai-analysis-hint {
            font-size: 7px;
            color: #9f92b7;
            margin-top: 4px;
        }

        .ai-preference-input {
            width: 100%;
            min-height: 34px;
            resize: none;
            border: 1px solid rgba(118, 75, 162, 0.18);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.72);
            color: #4d3c73;
            font-size: 8px;
            line-height: 1.45;
            padding: 6px 8px;
            outline: none;
            font-family: inherit;
        }

        .ai-preference-input:focus {
            border-color: rgba(118, 75, 162, 0.4);
            box-shadow: 0 0 0 1px rgba(118, 75, 162, 0.12);
        }

        .ai-preference-hint {
            font-size: 7px;
            color: #9f92b7;
            margin-top: 4px;
        }

        .trend-wrap {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-left: 0;
        }

        .trend-scroll-day {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 2px;
            scrollbar-width: thin;
        }

        .trend-svg {
            width: 100%;
            height: 84px;
            display: block;
        }

        .trend-svg-week {
            height: 104px;
        }

        .trend-labels {
            display: flex;
            justify-content: space-between;
            gap: 4px;
            flex-wrap: wrap;
            font-size: 7px;
            color: #8b7ea8;
            line-height: 1.2;
            margin-top: 2px;
        }

        .trend-label {
            max-width: 48px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .trend-wrap-week {
            position: relative;
            padding-bottom: 18px;
        }

        .trend-axis {
            position: relative;
            height: 14px;
            margin-top: 2px;
        }

        .week-axis-label {
            position: absolute;
            transform: translateX(-50%);
            font-size: 7px;
            color: #8b7ea8;
            white-space: nowrap;
        }

        .week-point-label {
            font-size: 7px;
            fill: url(#chartGradient);
            font-weight: 600;
        }

        .trend-meta {
            display: flex;
            justify-content: space-between;
            font-size: 8px;
            color: #8b7ea8;
        }

        .day-axis {
            position: relative;
            height: 12px;
            margin-top: 8px;
            font-size: 7px;
            color: #8b7ea8;
        }

        .day-axis-label {
            position: absolute;
            transform: translateX(-50%);
            white-space: nowrap;
        }

        .day-point-label {
            font-size: 7px;
            fill: url(#chartGradient);
            font-weight: 600;
        }

        .trend-chart-box {
            position: relative;
            margin: 0 auto;
            overflow: visible;
        }

        .chart-tooltip {
            position: absolute;
            min-width: 56px;
            max-width: 66px;
            padding: 4px 6px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(118, 75, 162, 0.08);
            box-shadow: 0 10px 24px rgba(96, 74, 134, 0.08);
            color: #5f4a86;
            font-size: 6px;
            line-height: 1.24;
            pointer-events: none;
            z-index: 3;
            backdrop-filter: blur(6px);
            animation: tooltipFadeIn 140ms ease-out;
        }

        .chart-tooltip::after {
            content: none;
        }

        .chart-tooltip-time {
            font-weight: 600;
            margin-bottom: 1px;
            color: #6d49b4;
            text-align: center;
        }

        .chart-tooltip-row {
            display: flex;
            justify-content: space-between;
            gap: 3px;
            white-space: nowrap;
        }

        @keyframes tooltipFadeIn {
            from {
                opacity: 0;
                transform: translateY(4px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .chart-tooltip-key {
            color: #8b7ea8;
        }

        .chart-y-axis {
            position: absolute;
            top: 0;
            height: 100%;
            pointer-events: none;
        }

        .chart-y-axis-tick {
            position: absolute;
            right: 8px;
            transform: translateY(-50%);
            font-size: 6px;
            color: #9d92b5;
            white-space: nowrap;
        }

        .chart-y-axis-line {
            position: absolute;
            right: 2px;
            width: 1px;
            background: rgba(118, 75, 162, 0.12);
        }

        .chart-x-axis-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(118, 75, 162, 0.12);
        }

        .chart-grid-line {
            stroke: rgba(118, 75, 162, 0.16);
            stroke-width: 1;
            stroke-dasharray: 3 4;
        }

        .chart-grid-line.week-vertical {
            stroke: rgba(139, 99, 220, 0.12);
            stroke-dasharray: 3 7;
        }

        .chart-grid-line.week-horizontal {
            stroke: rgba(139, 99, 220, 0.09);
            stroke-dasharray: none;
        }

        .week-chart-surface {
            fill: url(#weekAreaGradient);
        }

        .week-chart-ghost-line {
            fill: none;
            stroke: rgba(255, 255, 255, 0.58);
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .week-chart-line {
            fill: none;
            stroke: url(#weekLineGradient);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 4px 10px rgba(139, 99, 220, 0.16));
        }

        .week-point-ring {
            fill: rgba(255, 255, 255, 0.84);
            stroke: rgba(139, 99, 220, 0.24);
            stroke-width: 1;
        }

        .week-point-core {
            fill: url(#weekLineGradient);
        }

        .week-point-core.selected {
            filter: drop-shadow(0 0 8px rgba(139, 99, 220, 0.34));
        }

        .week-point-missing-ring {
            fill: rgba(255, 255, 255, 0.34);
            stroke: rgba(186, 170, 217, 0.5);
            stroke-width: 1;
        }

        .week-point-missing-core {
            fill: rgba(186, 170, 217, 0.34);
        }

        .selected-point-halo {
            filter: blur(2px);
        }

        .chart-value-label {
            position: absolute;
            color: #8b63dc;
            font-size: 6.5px;
            font-weight: 600;
            line-height: 1;
            white-space: nowrap;
            pointer-events: none;
            text-shadow: 0 0 2px #fff, 0 0 2px #fff;
        }

        .period-item {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 8px;
            padding: 6px 8px;
            margin-bottom: 6px;
            text-align: left;
        }

        .period-list {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 6px;
        }

        .period-chip {
            position: relative;
            border: none;
            border-radius: 9px;
            padding: 5px 6px;
            background: rgba(255, 255, 255, 0.72);
            color: #5f4a86;
            text-align: left;
            cursor: pointer;
            min-width: 0;
            width: 100%;
            box-sizing: border-box;
            box-shadow: inset 0 0 0 1px rgba(118, 75, 162, 0.08);
            overflow: hidden;
            transform: translateY(8px) scale(0.98);
            opacity: 0;
            animation: periodChipEnter 440ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
            animation-delay: var(--enter-delay, 0ms);
            transition:
                transform 220ms ease,
                box-shadow 220ms ease,
                background 220ms ease,
                color 220ms ease,
                filter 220ms ease;
        }

        .period-chip.active {
            background: var(--primary-gradient);
            color: #fff;
            box-shadow: 0 10px 22px rgba(118, 75, 162, 0.30);
            animation:
                periodChipEnter 440ms cubic-bezier(0.22, 1, 0.36, 1) forwards,
                periodChipPulse 2.4s ease-in-out infinite;
        }

        .period-chip.normal {
            background: rgba(118, 75, 162, 0.10);
        }

        .period-chip.overload {
            background: rgba(224, 176, 184, 0.28);
            color: #8c5a66;
        }

        .period-chip.active.normal {
            background: var(--primary-gradient);
            color: #fff;
        }

        .period-chip.active.overload {
            background: linear-gradient(135deg, #d89aa4 0%, #c97b86 100%);
            color: #fff;
        }

        .period-chip::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent 0%, rgba(255, 255, 255, 0.26) 42%, transparent 72%);
            transform: translateX(-130%);
            opacity: 0;
            transition: transform 480ms ease, opacity 240ms ease;
            pointer-events: none;
        }

        .period-chip::after {
            content: "";
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            box-shadow: 0 0 0 0 rgba(139, 99, 220, 0.0);
            opacity: 0;
            pointer-events: none;
        }

        .period-chip:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow:
                inset 0 0 0 1px rgba(118, 75, 162, 0.08),
                0 10px 20px rgba(109, 73, 180, 0.12);
            filter: saturate(1.04);
        }

        .period-chip:hover::before {
            transform: translateX(130%);
            opacity: 1;
        }

        .period-chip:active {
            transform: translateY(0) scale(0.99);
        }

        .period-chip:focus-visible {
            outline: none;
            box-shadow:
                inset 0 0 0 1px rgba(118, 75, 162, 0.10),
                0 0 0 2px rgba(139, 99, 220, 0.18),
                0 10px 18px rgba(109, 73, 180, 0.14);
        }

        .period-chip.active::after {
            opacity: 1;
            animation: periodChipGlow 2.4s ease-in-out infinite;
        }

        .period-chip-time {
            font-size: 8px;
            font-weight: 600;
            line-height: 1.15;
            margin-bottom: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .period-chip-state {
            font-size: 6px;
            opacity: 0.88;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @keyframes periodChipEnter {
            from {
                opacity: 0;
                transform: translateY(8px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes periodChipPulse {
            0%, 100% {
                box-shadow: 0 10px 22px rgba(118, 75, 162, 0.24);
            }
            50% {
                box-shadow: 0 14px 28px rgba(118, 75, 162, 0.34);
            }
        }

        @keyframes periodChipGlow {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(139, 99, 220, 0.0);
            }
            50% {
                box-shadow: 0 0 0 6px rgba(139, 99, 220, 0.12);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .period-chip,
            .period-chip.active,
            .period-chip.active::after {
                animation: none !important;
            }

            .period-chip,
            .period-chip::before {
                transition: none !important;
            }
        }

        .period-time {
            font-size: 9px;
            color: #444;
            margin-bottom: 3px;
        }

        .period-score {
            font-size: 8px;
            color: #8b7ea8;
        }

        .pie-summary {
            width: min(100%, 190px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .pie-ring {
            width: 144px;
            height: 144px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: conic-gradient(
                from 0deg,
                rgba(173, 141, 238, 0.98) 0%,
                rgba(150, 116, 229, 0.95) 42%,
                rgba(120, 82, 198, 0.92) 100%
            );
            box-shadow:
                0 16px 36px rgba(118, 75, 162, 0.10),
                0 0 0 1px rgba(255, 255, 255, 0.42) inset;
        }

        .pie-ring-inner {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.94);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--primary-solid);
            text-align: center;
            backdrop-filter: blur(12px);
            box-shadow:
                0 10px 24px rgba(118, 75, 162, 0.05),
                0 0 0 1px rgba(255, 255, 255, 0.78) inset;
        }

        .pie-ring-value {
            font-size: 22px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: -0.02em;
        }

        .pie-ring-label {
            font-size: 9px;
            margin-top: 3px;
        }

        .pie-legend {
            width: calc(100% - 8px);
            display: flex;
            justify-content: space-between;
            font-size: 8px;
            color: #555;
            gap: 6px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot.focused {
            background: linear-gradient(135deg, rgba(173, 141, 238, 0.96), rgba(120, 82, 198, 0.92));
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.58);
        }

        .dot.idle {
            background: rgba(214, 203, 235, 0.92);
        }

        .pie-recommendation {
            width: calc(100% - 8px);
            background: rgba(118, 75, 162, 0.08);
            border-radius: 10px;
            padding: 8px 10px;
            text-align: center;
        }

        .pie-rec-title {
            font-size: 11px;
            color: #5d3d85;
            font-weight: 700;
            margin-bottom: 3px;
        }

        .pie-rec-message {
            font-size: 7px;
            color: #777;
            line-height: 1.3;
        }

        /* 饼图页面样式 */
        .pie-back {
            display: flex;
            align-items: center;
            font-size: 9px;
            color: #764ba2;
            cursor: pointer;
            margin-bottom: 10px;
            padding-top: 10px;
            padding-left: 10px;
        }

        .pie-back::before {
            content: "◀";
            margin-right: 3px;
        }

        .pie-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 14px 12px;
            -webkit-app-region: no-drag;
        }
        
        .pie-placeholder {
            -webkit-app-region: no-drag;
        }

        .pie-placeholder {
            font-size: 10px;
            color: #aaa;
        }
        /* ===== 日历报告高亮 ===== */
        .calendar-cell.has-report {
            position: relative;
            border-radius: 10px;
            border: 1px solid rgba(139, 99, 220, 0.5);
            box-shadow: 0 0 6px rgba(139, 99, 220, 0.18);
            transition: all 0.2s ease;
        }

        /* 小紫点 */
        .calendar-cell .report-badge {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 5px;
            height: 5px;
            background: #8b63dc;
            border-radius: 50%;
            box-shadow: 0 0 4px rgba(139, 99, 220, 0.55);
        }

        /* hover（质感） */
        .calendar-cell.has-report:hover {
            transform: translateY(-1px) scale(1.05);
            box-shadow: 0 4px 8px rgba(139, 99, 220, 0.24);
        }

        /* 选中 + 有报告 */
        .calendar-cell.has-report.selected {
            background: linear-gradient(135deg, #c6a8ff, #8b63dc);
            color: white;
            border: none;
        }

        /* 普通数据弱化 */
        .calendar-cell.has-data:not(.has-report) {
            opacity: 0.7;
        }

        /* 图例 */
        .calendar-legend-dot.has-report {
            background: #8b63dc;
            box-shadow: 0 0 3px rgba(139, 99, 220, 0.28);
        }
    </style>
</head>
<body>
    <div class="window-container">
        <div class="content-wrapper" id="contentWrapper">

            <!-- 登录页面 -->
            <div class="page login-page" id="loginPage" style="left: 0;">
                <div class="page-inner">
                    <div class="login-content">
                        <div class="login-mark">
                            <img src="./logo-login.svg" alt="Focus logo">
                        </div>
                        <div class="login-card">
                            <div class="login-select-wrap">
                                <select id="loginUserSelect" class="login-select">
                                    <option value="">加载中...</option>
                                </select>
                            </div>
                            <button onclick="loginUser()" class="login-button">登录</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-container"></div>
            
            <!-- 主界面 -->
            <div class="page" id="mainPage">
                <div class="page-inner">
                    <button class="close-btn" onclick="quitApp()">×</button>
                    <div class="main-content">
                        <div class="timer-container" id="timerContainer">
                            <svg class="circle-progress" viewBox="0 0 110 110">
                                <defs>
                                    <linearGradient id="timerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop id="timerGradientStopStart" offset="0%" stop-color="#c6a8ff"></stop>
                                        <stop id="timerGradientStopMid" offset="45%" stop-color="#9a6df0"></stop>
                                        <stop id="timerGradientStopEnd" offset="100%" stop-color="#6d49b4"></stop>
                                    </linearGradient>
                                </defs>
                                <circle cx="55" cy="55" r="50" id="progressCircle"/>
                            </svg>
                            <div class="time-display" id="timeDisplay">25:00</div>
                        </div>
                        
                        <div class="btn-container" id="btnContainer">
                            <button class="btn" onclick="toggleTimer()"><span class="btn-icon play">▶</span></button>
                        </div>
                        
                        <div class="pomodoro-hint" id="pomodoroHint">今天第 1 个番茄钟</div>

                        <div class="ai-preference-wrap">
                            <button class="ai-preference-toggle" id="aiPreferenceToggle" onclick="toggleAiPreferencePanel()">
                                长期偏好
                            </button>
                        </div>
                        
                        <div class="bottom-bar">
                            <button class="icon-btn" onclick="showStatsPage()">☰</button>
                            <button class="logout-btn" onclick="logoutUser()">退出登录</button>
                            <button class="icon-btn" onclick="quitApp()">×</button>
                        </div>
                    </div>

                    <div class="ai-preference-body" id="aiPreferenceBody" onclick="closeAiPreferencePanel(event)">
                        <div class="ai-preference-modal" onclick="event.stopPropagation()">
                            <div class="ai-preference-modal-header">
                                <span>长期偏好</span>
                                <button class="ai-preference-close" onclick="closeAiPreferencePanel()">×</button>
                            </div>
                            <textarea
                                id="aiPreferenceInput"
                                class="ai-preference-input"
                                placeholder="比如：今天请更像朋友一点，少说数据，多说建议。"
                                onkeydown="handleAiPreferenceKeydown(event)"
                                oninput="handleAiPreferenceInput()"
                            ></textarea>
                            <div class="ai-preference-hint" id="aiPreferenceHint">会记住当前用户的偏好</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 统计页面 -->
            <div class="page stats-page" id="statsPage" style="left: -210px;">
                <div class="page-inner">
                    <div class="stats-header">
                        <button class="close-btn" onclick="quitApp()">×</button>
                    </div>
                    <div class="stats-back" onclick="hideStatsPage()">返回</div>
                    
                    <div class="stats-content">
                        <div class="tab-buttons">
                            <button class="tab-btn active" id="dayTab" onclick="switchTab('day')">日</button>
                            <button class="tab-btn" id="weekTab" onclick="switchTab('week')">周</button>
                        </div>

                        <div class="ym-nav">
                            <select id="yearSelect" class="ym-select" onchange="changeYearMonth()"></select>
                            <select id="monthSelect" class="ym-select" onchange="changeYearMonth()"></select>
                        </div>

                        <div class="calendar-panel">
                            <div class="calendar-panel-header">
                                <div class="calendar-title" id="calendarTitle">月历</div>
                                <div class="calendar-legend">
                                    <span class="calendar-legend-item"><span class="calendar-legend-dot has-data"></span>有数据</span>
                                    <span class="calendar-legend-item"><span class="calendar-legend-dot has-report"></span>有报告</span>
                                    <span class="calendar-legend-item"><span class="calendar-legend-dot"></span>无数据</span>
                                </div>
                            </div>
                            <div class="calendar-weekdays">
                                <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
                            </div>
                            <div class="calendar-grid" id="monthCalendar"></div>
                        </div>

                        <div class="date-nav">
                            <button class="date-btn" id="prevDate" onclick="changeDate(-1)"><</button>
                            <span class="date-text" id="dateText">2026年3月18日</span>
                            <button class="date-btn" id="nextDate" onclick="changeDate(1)">></button>
                        </div>
                        
                        <div class="focus-score-row">
                            <div>
                                <span class="focus-score-label" id="focusScoreLabel">专注度：</span>
                                <span class="focus-score-value" id="focusScore">--</span>
                            </div>
                            <span class="view-detail" onclick="showPiePage()">查看详情</span>
                        </div>

                        <div class="stats-row">
                            <div class="stat-col">
                                <div class="stat-col-label">总时长</div>
                                <div class="stat-col-value" id="totalTime">--</div>
                                <div class="stat-col-unit">分钟</div>
                            </div>
                            <div class="stat-col">
                                <div class="stat-col-label">专注时长</div>
                                <div class="stat-col-value" id="focusTime">--</div>
                                <div class="stat-col-unit">分钟</div>
                            </div>
                            <div class="stat-col">
                                <div class="stat-col-label">平均心率</div>
                                <div class="stat-col-value" id="heartRate">--</div>
                                <div class="stat-col-unit">bpm</div>
                            </div>
                        </div>

                        <div class="stats-section" id="dailyTaskSection">
                            <div class="section-label">今日任务</div>
                            <textarea
                                id="dailyTaskInput"
                                class="ai-preference-input"
                                placeholder="比如：今天主要复习英语，晚上整理笔记。"
                                oninput="handleDailyTaskInput()"
                            ></textarea>
                            <button class="generate-report-btn" id="generateReportBtn" onclick="generateDailyReport()">生成每日报告</button>

                        </div>

                        <div class="stats-section" id="aiAnalysisSection">
                            <div class="section-label" id="aiAnalysisLabel">学习报告分析</div>
                            <div class="ai-analysis-text" id="aiAnalysisText">（等待生成中）</div>
                            <div class="ai-analysis-hint">基于豆包和当前统计结果生成</div>
                        </div>

                        <div class="stats-section">
                            <div class="section-label" id="hrvChartLabel">番茄钟HRV曲线</div>
                            <div class="section-sub-label" id="chartAxisLabel">纵轴：专注评分</div>
                            <div class="section-placeholder" id="hrvChart">（折线图待接入）</div>
                        </div>
                        
                        <div class="stats-section" id="focusPeriodsSection">
                            <div class="section-label">专注时段</div>
                            <div class="section-placeholder" id="focusPeriods">（优秀时间段）</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 饼图页面 -->
            <div class="page pie-page" id="piePage" style="left: 210px;">
                <div class="page-inner">
                    <div class="stats-header">
                        <button class="close-btn" onclick="quitApp()">×</button>
                    </div>
                    <div class="pie-back" onclick="hidePiePage()">返回</div>
                    <div class="pie-content" id="pieContent">
                        <div class="pie-placeholder">饼图待接入</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function syncPageTransitionState() {
            ['mainPage', 'statsPage', 'piePage'].forEach(id => {
                const page = document.getElementById(id);
                if (!page) return;
                const left = Number.parseFloat(page.style.left || '0');
                page.classList.remove('is-offscreen-left', 'is-offscreen-right');
                if (left < 0) {
                    page.classList.add('is-offscreen-left');
                } else if (left > 0) {
                    page.classList.add('is-offscreen-right');
                }
            });
        }

        function resolveApiBase() {
            const params = new URLSearchParams(window.location.search || '');
            const queryApiBase = (params.get('api_base') || '').trim();
            const storedApiBase = (localStorage.getItem('focus_api_base') || '').trim();
            const protocol = window.location.protocol;
            const hostname = window.location.hostname;

            if (queryApiBase) {
                localStorage.setItem('focus_api_base', queryApiBase);
                return queryApiBase;
            }

            if (storedApiBase) {
                return storedApiBase;
            }

            if ((protocol === 'http:' || protocol === 'https:') && hostname) {
                return `${protocol}//${hostname}:8000`;
            }

            return 'http://127.0.0.1:8000';
        }

        function formatDate(date) {
            return date.getFullYear() + '年' + (date.getMonth() + 1) + '月' + date.getDate() + '日';
        }

        function formatDateKey(date) {
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${date.getFullYear()}-${month}-${day}`;
        }

        function parseDateKey(dateKey) {
            const [year, month, day] = dateKey.split('-').map(Number);
            return new Date(year, month - 1, day);
        }

        function formatWeekRangeLabel(date) {
            const start = new Date(date);
            const day = start.getDay();
            const offset = day === 0 ? -6 : 1 - day;
            start.setDate(start.getDate() + offset);
            const end = new Date(start);
            end.setDate(start.getDate() + 6);
            return `${start.getMonth() + 1}月${start.getDate()}日 - ${end.getMonth() + 1}月${end.getDate()}日`;
        }

        function getCalendarDateSet() {
            return new Set((currentCalendarIndex.available_dates || []).map(String));
        }

        function getSelectedMonthKey() {
            const yearSelect = document.getElementById('yearSelect');
            const monthSelect = document.getElementById('monthSelect');
            const year = Number(yearSelect?.value || currentDate.getFullYear());
            const month = Number(monthSelect?.value || currentDate.getMonth() + 1);
            return `${year}-${String(month).padStart(2, '0')}`;
        }

        function updateCalendarTitle() {
            const title = document.getElementById('calendarTitle');
            if (!title) return;
            title.innerHTML = `
                <span class="calendar-title-year">${currentDate.getFullYear()}年</span>
                <span class="calendar-title-month">${currentDate.getMonth() + 1}月</span>
            `;
        }

        function renderMonthCalendar() {
            const container = document.getElementById('monthCalendar');
            if (!container) return;

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1);
            const firstWeekday = firstDay.getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const selectedKey = formatDateKey(currentDate);
            const availableDates = getCalendarDateSet();

            const cells = [];
            for (let i = 0; i < firstWeekday; i++) {
                cells.push('<div class="calendar-cell blank"></div>');
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateObj = new Date(year, month, day);
                const dateKey = formatDateKey(dateObj);
                const hasData = availableDates.has(dateKey);
                const isSelected = dateKey === selectedKey;
                const classes = ['calendar-cell'];
                if (hasData) classes.push('has-data');

                // ⭐ 判断是否有报告
                const hasReport = localStorage.getItem(
                    `focus_daily_report_ready_${currentUserId || 'guest'}_${dateKey}`
                ) === '1';

                if (hasReport) classes.push('has-report');

                if (isSelected) classes.push('selected');
                if (dateKey === currentAnimatingCalendarDateKey) classes.push('is-clicking');
                if (!hasData) classes.push('disabled');
                const label = day;
                cells.push(`
                    <div class="${classes.join(' ')}"
                         data-date="${dateKey}"
                         title="${hasReport ? '已生成报告' : ''}"
                         ${hasData ? `onclick="selectCalendarDate('${dateKey}')"` : ''}>
                        ${label}
                        ${hasData ? '<span class="dot"></span>' : ''}
                    </div>
                `);
            }

            container.innerHTML = cells.join('');
            updateMonthSelectMarks();
            updateCalendarTitle();
        }

            const monthSelect = document.getElementById('monthSelect');
            if (!monthSelect) return;
            const year = currentDate.getFullYear();

                const month = String(option.value).padStart(2, '0');

                const count = counts[key] || 0;
                const baseLabel = `${month}月`;
                option.textContent = count > 0 ? `${baseLabel} · ${count}` : baseLabel;

        function renderPomodoroCurve(points) {
            const container = document.getElementById('hrvChart');
            if (!points || points.length === 0) {
                currentPomodoroCurvePoints = [];
                container.classList.remove('chart-host');
                container.innerHTML = '（暂无该番茄钟专注度曲线）';
                return;
            }

            currentPomodoroCurvePoints = points.slice();
            const values = points.map(point => point.focus ?? point.value ?? null);
            const validValues = values.filter(value => value !== null && value !== undefined);
            if (validValues.length === 0) {
                currentPomodoroCurvePoints = [];
                container.classList.remove('chart-host');
                container.innerHTML = '（暂无该番茄钟专注度曲线）';
                return;
            }

            container.classList.add('chart-host');

            const accent = '#8b63dc';
            const width = 164;
            const height = 92;
            const paddingRight = 8;
            const paddingTop = 16;
            const paddingBottom = 16;
            const xAxisY = height - paddingBottom + 4;
            const axisX = 14;
            const scaleMin = 0;
            const scaleMax = 100;
            const range = scaleMax - scaleMin || 1;
            const plotWidth = width - axisX - paddingRight;
            const step = points.length > 1 ? plotWidth / (points.length - 1) : 0;
            const coords = points.map((point, index) => {
                const rawValue = point.focus ?? point.value ?? null;
                if (rawValue === null || rawValue === undefined) return null;
                const value = Math.max(scaleMin, Math.min(scaleMax, Number(rawValue)));
                const x = axisX + index * step;
                const y = xAxisY - ((value - scaleMin) / range) * (xAxisY - paddingTop);
                return {
                    x,
                    y,
                    value,
                    focus: Number(point.focus ?? point.value ?? value),
                    stress: Number(point.stress ?? 0),
                    time: point.time || point.label || '',
                };
            }).filter(Boolean);
            const linePoints = coords.map(point => `${point.x},${point.y}`).join(' ');

            const hasSelection = currentSelectedCurvePointIndex >= 0 && currentSelectedCurvePointIndex < coords.length;
            const safeSelectedIndex = hasSelection ? currentSelectedCurvePointIndex : -1;
            const selectedPoint = hasSelection ? coords[safeSelectedIndex] : null;

            const dotMarkup = coords.map((point, index) => {
                const isSelected = index === safeSelectedIndex;
                return `
                    <g data-point-hit="1" style="cursor:pointer" onclick="selectPomodoroCurvePoint(${index}, event)">
                        ${isSelected ? `<circle class="selected-point-halo" cx="${point.x}" cy="${point.y}" r="9" fill="${accent}" opacity="0.18"></circle>` : ''}
                        <circle cx="${point.x}" cy="${point.y}" r="${isSelected ? 5.5 : 4.5}" fill="${accent}" opacity="${isSelected ? '1' : '0.92'}"></circle>
                        <circle cx="${point.x}" cy="${point.y}" r="${isSelected ? 9 : 7}" fill="transparent">
                            <title>${point.time}: 专注 ${point.focus.toFixed(1)} / 压力 ${point.stress.toFixed(1)}</title>
                        </circle>
                    </g>
                `;
            }).join('');

            const gridMarkup = coords.map((point) => `
                <line
                    class="chart-grid-line"
                    x1="${point.x}"
                    y1="${paddingTop}"
                    x2="${point.x}"
                    y2="${xAxisY}"
                ></line>
            `).join('');

            const axisLabels = coords.map((point) => `
                <span class="day-axis-label" style="left:${point.x}px">${point.time}</span>
            `).join('');

            let tooltipMarkup = '';
            if (selectedPoint) {
                const tooltipWidth = 62;
                const tooltipHeight = 28;
                const tooltipLeft = Math.max(4, Math.min(selectedPoint.x - tooltipWidth / 2, width - tooltipWidth - 4));
                const preferredBelowTop = selectedPoint.y + 10;
                const maxBelowTop = height - tooltipHeight - paddingBottom - 2;
                const preferredAboveTop = selectedPoint.y - tooltipHeight - 10;
                const tooltipTop = preferredBelowTop <= maxBelowTop
                    ? preferredBelowTop
                    : Math.max(4, preferredAboveTop);
                tooltipMarkup = `
                    <div class="chart-tooltip" style="left:${tooltipLeft}px; top:${tooltipTop}px;">
                        <div class="chart-tooltip-time">${selectedPoint.time}</div>
                        <div class="chart-tooltip-row"><span class="chart-tooltip-key">专注</span><span>${selectedPoint.focus.toFixed(1)}</span></div>
                        <div class="chart-tooltip-row"><span class="chart-tooltip-key">压力</span><span>${selectedPoint.stress.toFixed(1)}</span></div>
                    </div>
                `;
            }

            const xAxisRight = axisX + Math.max(0, points.length - 1) * step;

            container.innerHTML = `
                <div class="trend-wrap" onclick="clearPomodoroCurveSelection(event)">
                    <div class="trend-chart-box" style="width:${width}px;" onclick="clearPomodoroCurveSelection(event)">
                        <div class="chart-x-axis-line" style="left:${axisX - 3}px; width:${xAxisRight - axisX + 3}px; top:${xAxisY}px;"></div>
                        <svg class="trend-svg" style="width:${width}px; height:${height}px; display:block; margin:0 auto;" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
                            ${gridMarkup}
                            <polyline points="${linePoints}" fill="none" stroke="${accent}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></polyline>
                            ${dotMarkup}
                        </svg>
                        ${tooltipMarkup}
                        <div class="day-axis" style="width:${width}px; margin:0 auto;">${axisLabels}</div>
                    </div>
                </div>
            `;
        }

        function selectPomodoro(index) {
            if (!currentFocusPeriods || currentFocusPeriods.length === 0) return;
            currentSelectedPomodoroIndex = Math.max(0, Math.min(index, currentFocusPeriods.length - 1));
            const period = currentFocusPeriods[currentSelectedPomodoroIndex];
            currentSelectedCurvePointIndex = Math.max(0, (period.hrv_points || []).length - 1);
            document.querySelectorAll('.period-chip').forEach((el, idx) => {
                el.classList.toggle('active', idx === currentSelectedPomodoroIndex);
            });
            updateHrvChartLabel(period);
            renderPomodoroCurve(period.hrv_points || []);
        }

        function renderTrendChart(points) {
            const container = document.getElementById('hrvChart');
            if (!points || points.length === 0) {
                container.classList.remove('chart-host');
                container.innerHTML = '（暂无趋势数据）';
                return;
            }

            const isWeekView = currentTab === 'week';
            if (isWeekView) {
                const values = points.map(point => point.value);
                const validValues = values.filter(value => value !== null && value !== undefined);
                if (validValues.length === 0) {
                    container.classList.remove('chart-host');
                    container.innerHTML = '（暂无周趋势数据）';
                    return;
                }

                container.classList.add('chart-host');

                const accent = '#8b63dc';
                const width = 164;
                const height = 92;
                const paddingTop = 16;
                const paddingBottom = 16;
                const paddingRight = 8;
                const axisX = 14;
                const xAxisY = height - paddingBottom + 4;
                const scaleMin = 0;
                const scaleMax = 100;
                const range = scaleMax - scaleMin || 1;
                const plotWidth = width - axisX - paddingRight;
                const stepX = points.length > 1 ? plotWidth / (points.length - 1) : 0;

                const coords = points.map((point, index) => {
                    if (point.value === null || point.value === undefined) return null;
                    const x = axisX + index * stepX;
                    const clampedValue = Math.max(scaleMin, Math.min(scaleMax, Number(point.value)));
                    const y = xAxisY - ((clampedValue - scaleMin) / range) * (xAxisY - paddingTop);
                    return { x, y, value: clampedValue, time: point.time || '', raw: point };
                });

                const segments = [];
                let currentSegment = [];
                coords.forEach((point) => {
                    if (point) {
                        currentSegment.push(`${point.x},${point.y}`);
                    } else if (currentSegment.length) {
                        if (currentSegment.length > 1) segments.push(currentSegment.slice());
                        currentSegment = [];
                    }
                });
                if (currentSegment.length > 1) segments.push(currentSegment.slice());

                const lineMarkup = segments.map(segment => `
                    <polyline points="${segment.join(' ')}" fill="none" stroke="url(#chartGradient)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></polyline>
                `).join('');

                const hasSelection = currentSelectedWeekPointIndex >= 0 && currentSelectedWeekPointIndex < coords.length && !!coords[currentSelectedWeekPointIndex];
                const safeSelectedIndex = hasSelection ? currentSelectedWeekPointIndex : -1;
                const selectedPoint = hasSelection ? coords[safeSelectedIndex] : null;

                const dotMarkup = coords.map((point, index) => {
                    const x = axisX + index * stepX;
                    const isSelected = index === safeSelectedIndex;
                    if (!point) {
                        return `
                            <g>
                                <circle cx="${x}" cy="${height / 2}" r="6.5" fill="rgba(198,168,255,0.25)"></circle>
                                <circle cx="${x}" cy="${height / 2}" r="9" fill="transparent">
                                    <title>暂无数据</title>
                                </circle>
                            </g>
                        `;
                    }
                    return `
                        <g data-point-hit="1" style="cursor:pointer" onclick="selectWeekTrendPoint(${index}, event)">
                            ${isSelected ? `<circle class="selected-point-halo" cx="${point.x}" cy="${point.y}" r="9" fill="${accent}" opacity="0.18"></circle>` : ''}
                            <circle cx="${point.x}" cy="${point.y}" r="${isSelected ? 5.5 : 4.5}" fill="${accent}" opacity="${isSelected ? '1' : '0.92'}"></circle>
                            <circle cx="${point.x}" cy="${point.y}" r="9" fill="transparent">
                                <title>${points[index].time || ''}: ${points[index].value?.toFixed(1) ?? '--'}</title>
                            </circle>
                        </g>
                    `;
                }).join('');

                const gridMarkup = points.map((point, index) => {
                    const x = axisX + index * stepX;
                    return `
                        <line class="chart-grid-line" x1="${x}" y1="${paddingTop}" x2="${x}" y2="${xAxisY}"></line>
                    `;
                }).join('');

                const xAxisRight = axisX + Math.max(0, points.length - 1) * stepX;

                const axisLabels = points.map((point, index) => {
                    const x = axisX + index * stepX;
                    return `<span class="week-axis-label" style="left:${x}px">${point.time}</span>`;
                }).join('');

                let tooltipMarkup = '';
                if (selectedPoint) {
                    const tooltipWidth = 62;
                    const tooltipHeight = 28;
                    const tooltipLeft = Math.max(4, Math.min(selectedPoint.x - tooltipWidth / 2, width - tooltipWidth - 4));
                    const preferredBelowTop = selectedPoint.y + 10;
                    const maxBelowTop = height - tooltipHeight - paddingBottom - 2;
                    const preferredAboveTop = selectedPoint.y - tooltipHeight - 10;
                    const tooltipTop = preferredBelowTop <= maxBelowTop
                        ? preferredBelowTop
                        : Math.max(4, preferredAboveTop);
                    tooltipMarkup = `
                        <div class="chart-tooltip" style="left:${tooltipLeft}px; top:${tooltipTop}px;">
                            <div class="chart-tooltip-time">${selectedPoint.time}</div>
                            <div class="chart-tooltip-row"><span class="chart-tooltip-key">专注</span><span>${selectedPoint.value.toFixed(1)}</span></div>
                        </div>

                }

                container.innerHTML = `
                    <div class="trend-wrap trend-wrap-week" onclick="clearWeekTrendSelection(event)">
                        <div class="trend-chart-box" style="width:${width}px;" onclick="clearWeekTrendSelection(event)">
                            <div class="chart-x-axis-line" style="left:${axisX - 3}px; width:${xAxisRight - axisX + 3}px; top:${xAxisY}px;"></div>
                            <svg class="trend-svg trend-svg-week" style="width:${width}px; height:${height}px; display:block; margin:0 auto;" viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMidYMid meet">
                                <defs>
                                    <linearGradient id="chartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" stop-color="#c7a8ff"></stop>
                                        <stop offset="55%" stop-color="#9163e8"></stop>
                                        <stop offset="100%" stop-color="#6f47b8"></stop>
                                    </linearGradient>
                                </defs>
                                ${gridMarkup}
                                ${lineMarkup}
                                ${dotMarkup}
                            </svg>
                            ${tooltipMarkup}
                            <div class="trend-axis" style="width:${width}px; margin:0 auto;">${axisLabels}</div>
                        </div>
                    </div>
                `;
                return;
            }

            const width = 170;
            const height = 84;
            const paddingLeft = 18;
            const paddingRight = 18;
            const paddingY = 10;
            const scaleMin = Math.min(...points.map(point => point.value ?? point.hrv ?? point.focus ?? point.stress ?? 0));
            const scaleMax = Math.max(...points.map(point => point.value ?? point.hrv ?? point.focus ?? point.stress ?? 0));
            const range = scaleMax - scaleMin || 1;
            const scrollWidth = 720;
            const plotWidth = scrollWidth - paddingLeft - paddingRight;

            function parseClockMinutes(timeText) {
                if (!timeText || typeof timeText !== 'string') return null;
                const match = timeText.match(/(\d{1,2}):(\d{2})/);
                if (!match) return null;
                const hour = Number(match[1]);
                const minute = Number(match[2]);
                if (Number.isNaN(hour) || Number.isNaN(minute)) return null;
                return hour * 60 + minute;
            }

            const coords = points.map((point) => {
                const value = point.value ?? point.hrv ?? point.focus ?? point.stress ?? null;
                const minutes = parseClockMinutes(point.time || point.label || '');
                if (value === null || value === undefined || minutes === null) return null;
                const x = paddingLeft + (minutes / (24 * 60)) * plotWidth;
                const y = height - paddingY - ((value - scaleMin) / range) * (height - paddingY * 2);
                return { x, y, value, time: point.time || point.label || '' };
            });

            const dotMarkup = coords.map((point, index) => {
                const rawPoint = points[index];
                if (!point) {
                    const missingMinutes = parseClockMinutes(rawPoint.time || rawPoint.label || '');
                    const x = missingMinutes === null
                        ? paddingLeft + (index / Math.max(points.length - 1, 1)) * plotWidth
                        : paddingLeft + (missingMinutes / (24 * 60)) * plotWidth;
                    return `
                        <g>
                            <circle cx="${x}" cy="${height / 2 - 2}" r="6.5" fill="rgba(198,168,255,0.25)"></circle>
                            <circle cx="${x}" cy="${height / 2 - 2}" r="9" fill="transparent">
                                <title>暂无数据</title>
                            </circle>
                        </g>
                    `;
                }
                return `
                    <g>
                        <circle cx="${point.x}" cy="${point.y}" r="5" fill="url(#chartGradient)"></circle>
                        <circle cx="${point.x}" cy="${point.y}" r="6" fill="transparent">
                            <title>${rawPoint.time || rawPoint.label || ''}: ${Number(point.value).toFixed(1)}</title>
                        </circle>
                    </g>
                `;
            }).join('');

            const axisTicks = [0, 6, 12, 18, 24].map(hour => {
                const x = paddingLeft + (hour / 24) * plotWidth;
                const label = hour === 24 ? '24:00' : `${String(hour).padStart(2, '0')}:00`;
                return `<span class="day-axis-label" style="left:${x}px">${label}</span>`;
            }).join('');

            container.innerHTML = `
                    <div class="trend-wrap">
                    <div class="trend-scroll-day">
                        <svg class="trend-svg" style="width:${scrollWidth}px; min-width:${scrollWidth}px;" viewBox="0 0 ${scrollWidth} ${height}" preserveAspectRatio="none">
                            <defs>
                                <linearGradient id="chartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#c6a8ff"></stop>
                                    <stop offset="45%" stop-color="#9a6df0"></stop>
                                    <stop offset="100%" stop-color="#6d49b4"></stop>
                                </linearGradient>
                            </defs>
                            ${dotMarkup}
                        </svg>
                        <div class="day-axis" style="width:${scrollWidth}px;">${axisTicks}</div>
                    </div>
                </div>
            `;
            container.classList.add('chart-host');
        }

        function setPieRingProgress(element, percent) {
            if (!element) return;
            const safePercent = Math.max(0, Math.min(100, Number(percent) || 0));
            element.style.background = `conic-gradient(
                from 0deg,
                rgba(173, 141, 238, 0.98) 0%,
