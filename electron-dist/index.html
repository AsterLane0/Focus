<!DOCTYPE html>
<html lang="zh-CN" style="background: transparent;">
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        :root {
            --primary-solid: #764ba2;
            --primary-deep: #5f3fa8;
            --primary-soft: #b99cf7;
            --primary-gradient: linear-gradient(135deg, #b08cf5 0%, #8b63dc 45%, #6d49b4 100%);
            --primary-gradient-soft: linear-gradient(135deg, rgba(176, 140, 245, 0.95) 0%, rgba(139, 99, 220, 0.95) 55%, rgba(109, 73, 180, 0.95) 100%);
        }

        html, body {
            background: transparent !important;
            margin: 0 !important;
            padding: 0 !important;
            border: none !important;
            overflow: hidden !important;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Microsoft YaHei', -apple-system, sans-serif;
            position: relative;
        }

        html {
            background: transparent;
        }

        .window-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            will-change: transform;
        }

        .content-wrapper {
            position: relative;
            width: 210px;
            height: 300px;
            overflow: hidden;
            clip-path: inset(0);
            -webkit-app-region: drag;
        }

        .content-wrapper button,
        .content-wrapper input,
        .content-wrapper .icon-btn,
        .content-wrapper .tab-btn,
        .content-wrapper .date-btn,
        .content-wrapper .close-btn,
        .content-wrapper .stats-back,
        .content-wrapper .view-detail,
        .content-wrapper .pie-back,
        .content-wrapper .btn-container,
        .content-wrapper .bottom-bar {
            -webkit-app-region: no-drag;
        }

        .bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 210px;
            height: 300px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 210px;
            height: 300px;
            border-radius: 30px;
            overflow: hidden;
            will-change: left;
            background: rgba(255, 255, 255, 0.7);
        }

        .page-inner {
            width: 210px;
            height: 300px;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 12px 8px;
            width: 100%;
            height: 100%;
        }

        .close-btn {
            position: absolute;
            top: 3px;
            right: 15px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            color: #555;
            font-size: 14px;
            z-index: 100;
        }

        .task-input {
            width: 150px;
            font-size: 10px;
            text-align: center;
            border: none;
            background: transparent;
            color: #222;
            outline: none;
            margin: 8px auto;
        }

        .task-input::placeholder {
            color: #666;
        }

        .timer-container {
            position: relative;
            width: 124px;
            height: 124px;
            margin: 2px auto 8px;
            flex-shrink: 0;
        }

        .circle-progress {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
            transform-origin: center center;
            display: block;
            overflow: visible;
        }

        .circle-progress circle {
            fill: none;
            stroke: url(#timerGradient);
            stroke-width: 5;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear;
        }

        .time-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #222;
            font-size: 26px;
            font-weight: 400;
            line-height: 1;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum" 1;
            z-index: 2;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 8px;
            position: relative;
            z-index: 100;
            flex-shrink: 0;
        }

        .btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: none;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-gradient);
            box-shadow: 0 6px 14px rgba(118, 75, 162, 0.24);
            color: white;
        }

        .status {
            color: #555;
            font-size: 9px;
            margin-top: 8px;
            font-weight: 500;
            text-align: center;
            width: 100%;
            flex-shrink: 0;
        }

        .pomodoro-hint {
            color: #aaa;
            font-size: 8px;
            margin-top: 4px;
            text-align: center;
            width: 100%;
            line-height: 1.2;
            flex-shrink: 0;
        }

        .ai-preference-wrap {
            width: 178px;
            margin-top: 6px;
            flex-shrink: 0;
        }

        .ai-preference-toggle {
            width: 100%;
            border: none;
            background: rgba(118, 75, 162, 0.08);
            color: #6d49b4;
            border-radius: 10px;
            font-size: 8px;
            padding: 6px 8px;
            cursor: pointer;
            text-align: left;
        }

        .ai-preference-toggle::after {
            content: "▾";
            float: right;
            color: #8b63dc;
        }

        .ai-preference-toggle.expanded::after {
            content: "▴";
        }

        .ai-preference-body {
            display: none;
            position: absolute;
            inset: 0;
            z-index: 180;
            background: rgba(255, 255, 255, 0.16);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
        }

        .ai-preference-body.open {
            display: flex;
        }

        .ai-preference-modal {
            width: 178px;
            padding: 10px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 12px 32px rgba(96, 74, 134, 0.18);
            border: 1px solid rgba(118, 75, 162, 0.12);
        }

        .ai-preference-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #6d49b4;
            font-size: 8px;
            font-weight: 600;
        }

        .ai-preference-close {
            border: none;
            background: transparent;
            color: #8b63dc;
            font-size: 10px;
            cursor: pointer;
            line-height: 1;
        }

        .generate-report-btn {
            width: 100%;
            border: none;
            border-radius: 8px;
            margin-top: 6px;
            padding: 6px 8px;
            font-size: 8px;
            color: #fff;
            background: var(--primary-gradient);
            box-shadow: 0 4px 10px rgba(118, 75, 162, 0.18);
            cursor: pointer;
        }

        .generate-report-btn.is-generating,
        .generate-report-btn:disabled {
            background: linear-gradient(135deg, #cfc8db 0%, #b8b1c6 100%) !important;
            box-shadow: none !important;
            color: rgba(255, 255, 255, 0.95);
            cursor: not-allowed;
            opacity: 1;
            filter: grayscale(0.15);
        }

        .completed {
            color: #4CAF50;
            font-size: 10px;
            font-weight: 600;
            text-align: center;
        }

        .bottom-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 15px;
            margin-top: auto;
            margin-bottom: 8px;
        }

        .logout-btn {
            border: none;
            background: transparent;
            color: #8b7ea8;
            font-size: 8px;
            cursor: pointer;
            padding: 0;
        }

        .icon-btn {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            color: #555;
            font-size: 10px;
        }

        /* 统计页面样式 */
        .stats-header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
            padding-top: 5px;
        }

        .stats-back {
            display: flex;
            align-items: center;
            font-size: 9px;
            color: #764ba2;
            cursor: pointer;
            margin-bottom: 15px;
            padding-top: 10px;
            padding-left: 10px;
        }

        .stats-back::before {
            content: "◀";
            margin-right: 5px;
        }

        .stats-content {
            flex: 1;
            overflow-y: scroll;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 0 12px;
            pointer-events: auto;
            -webkit-app-region: drag;
        }
        
        .stats-content button,
        .stats-content .stat-col,
        .stats-content .stats-section,
        .stats-content select {
            -webkit-app-region: no-drag;
        }

        .stats-content::-webkit-scrollbar {
            display: none;
        }

        .tab-buttons {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            justify-content: flex-start;
            padding-left: 10px;
        }

        .tab-btn {
            padding: 4px 8px;
            border: none;
            border-radius: 10px;
            background: #ddd;
            color: #666;
            font-size: 8px;
            cursor: pointer;
        }

        .tab-btn.active {
            background: var(--primary-gradient);
            color: white;
        }

        .date-nav {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 12px;
            gap: 8px;
        }

        .ym-nav {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 6px;
            margin-bottom: 10px;
            padding-left: 10px;
        }

        .ym-select {
            border: 1px solid rgba(118, 75, 162, 0.15);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.85);
            color: #5f4a86;
            font-size: 8px;
            padding: 3px 6px;
            outline: none;
        }

        .calendar-panel {
            margin: 4px 10px 10px;
            padding: 8px 8px 6px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.55);
            border: 1px solid rgba(118, 75, 162, 0.08);
        }

        .calendar-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .calendar-title {
            font-size: 8px;
            color: #5f4a86;
            font-weight: 600;
        }

        .calendar-legend {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 7px;
            color: #9a92ad;
        }

        .calendar-legend-item {
            display: flex;
            align-items: center;
            gap: 3px;
            white-space: nowrap;
        }

        .calendar-legend-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
            background: rgba(118, 75, 162, 0.2);
        }

        .calendar-legend-dot.has-data {
            background: var(--primary-solid);
        }

        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            margin-bottom: 4px;
            font-size: 6px;
            color: #a69bb8;
            text-align: center;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }

        .calendar-cell {
            position: relative;
            min-height: 20px;
            border-radius: 5px;
            font-size: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8e84a6;
            background: rgba(118, 75, 162, 0.05);
            cursor: default;
            user-select: none;
        }

        .calendar-cell.blank {
            background: transparent;
        }

        .calendar-cell.has-data {
            background: rgba(118, 75, 162, 0.12);
            color: #5f3f91;
            font-weight: 600;
            cursor: pointer;
        }

        .calendar-cell.selected {
            background: var(--primary-gradient);
            color: #fff;
        }

        .calendar-cell.disabled {
            opacity: 0.35;
        }

        .calendar-cell .dot {
            position: absolute;
            bottom: 2px;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--primary-solid);
        }

        .date-btn {
            width: auto;
            height: auto;
            border: none;
            background: transparent;
            color: var(--primary-solid);
            cursor: pointer;
            font-size: 12px;
            padding: 2px 4px;
        }

        .date-btn.disabled {
            background: transparent;
            color: #999;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .date-text {
            font-size: 10px;
            color: #333;
            white-space: nowrap;
        }

        .focus-score-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(118, 75, 162, 0.2);
            margin-bottom: 12px;
        }

        .focus-score-label {
            font-size: 11px;
            color: #333;
        }

        .focus-score-value {
            font-size: 11px;
            color: #333;
            font-weight: bold;
        }

        .view-detail {
            font-size: 9px;
            color: #aaa;
            cursor: pointer;
        }

        .stats-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .stat-col {
            flex: 1;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            padding: 10px 5px;
            text-align: center;
        }

        .stat-col-label {
            font-size: 9px;
            color: #888;
            margin-bottom: 4px;
        }

        .stat-col-value {
            font-size: 15px;
            color: #333;
            font-weight: bold;
        }

        .stat-col-unit {
            font-size: 9px;
            color: #888;
        }

        .stats-section {
            background: rgba(118, 75, 162, 0.1);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
        }

        .section-label {
            font-size: 10px;
            color: #888;
            margin-bottom: 4px;
        }

        .section-placeholder {
            font-size: 10px;
            color: #aaa;
            text-align: center;
            padding: 10px;
        }

        .ai-analysis-text {
            font-size: 8px;
            color: #5f4a86;
            line-height: 1.55;
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 30px;
        }

        .ai-analysis-hint {
            font-size: 7px;
            color: #9f92b7;
            margin-top: 4px;
        }

        .ai-preference-input {
            width: 100%;
            min-height: 34px;
            resize: none;
            border: 1px solid rgba(118, 75, 162, 0.18);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.72);
            color: #4d3c73;
            font-size: 8px;
            line-height: 1.45;
            padding: 6px 8px;
            outline: none;
            font-family: inherit;
        }

        .ai-preference-input:focus {
            border-color: rgba(118, 75, 162, 0.4);
            box-shadow: 0 0 0 1px rgba(118, 75, 162, 0.12);
        }

        .ai-preference-hint {
            font-size: 7px;
            color: #9f92b7;
            margin-top: 4px;
        }

        .trend-wrap {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .trend-scroll-day {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 2px;
            scrollbar-width: thin;
        }

        .trend-svg {
            width: 100%;
            height: 84px;
            display: block;
        }

        .trend-svg-week {
            height: 104px;
        }

        .trend-labels {
            display: flex;
            justify-content: space-between;
            gap: 4px;
            flex-wrap: wrap;
            font-size: 7px;
            color: #8b7ea8;
            line-height: 1.2;
            margin-top: 2px;
        }

        .trend-label {
            max-width: 48px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .trend-wrap-week {
            position: relative;
            padding-bottom: 18px;
        }

        .trend-axis {
            position: relative;
            height: 14px;
            margin-top: 2px;
        }

        .week-axis-label {
            position: absolute;
            transform: translateX(-50%);
            font-size: 7px;
            color: #8b7ea8;
            white-space: nowrap;
        }

        .week-point-label {
            font-size: 7px;
            fill: url(#chartGradient);
            font-weight: 600;
        }

        .trend-meta {
            display: flex;
            justify-content: space-between;
            font-size: 8px;
            color: #8b7ea8;
        }

        .day-axis {
            position: relative;
            height: 12px;
            margin-top: 2px;
            font-size: 7px;
            color: #8b7ea8;
        }

        .day-axis-label {
            position: absolute;
            transform: translateX(-50%);
            white-space: nowrap;
        }

        .day-point-label {
            font-size: 7px;
            fill: url(#chartGradient);
            font-weight: 600;
        }

        .chart-axis-note {
            font-size: 7px;
            color: #8b7ea8;
            margin-bottom: 2px;
            line-height: 1.2;
        }

        .chart-value-label {
            position: absolute;
            color: #8b63dc;
            font-size: 6.5px;
            font-weight: 600;
            line-height: 1;
            white-space: nowrap;
            pointer-events: none;
            text-shadow: 0 0 2px #fff, 0 0 2px #fff;
        }

        .period-item {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 8px;
            padding: 6px 8px;
            margin-bottom: 6px;
            text-align: left;
        }

        .period-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .period-chip {
            border: none;
            border-radius: 10px;
            padding: 7px 8px;
            background: rgba(255, 255, 255, 0.72);
            color: #5f4a86;
            text-align: left;
            cursor: pointer;
            min-width: 0;
            flex: 0 0 auto;
            max-width: 100%;
            box-shadow: inset 0 0 0 1px rgba(118, 75, 162, 0.08);
        }

        .period-chip.active {
            background: var(--primary-gradient);
            color: #fff;
            box-shadow: none;
        }

        .period-chip.normal {
            background: rgba(118, 75, 162, 0.10);
        }

        .period-chip.overload {
            background: rgba(224, 176, 184, 0.28);
            color: #8c5a66;
        }

        .period-chip.active.normal {
            background: var(--primary-gradient);
            color: #fff;
        }

        .period-chip.active.overload {
            background: linear-gradient(135deg, #d89aa4 0%, #c97b86 100%);
            color: #fff;
        }

        .period-chip-time {
            font-size: 9px;
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: 2px;
            white-space: nowrap;
        }

        .period-chip-state {
            font-size: 7px;
            opacity: 0.9;
            white-space: nowrap;
        }

        .period-time {
            font-size: 9px;
            color: #444;
            margin-bottom: 3px;
        }

        .period-score {
            font-size: 8px;
            color: #8b7ea8;
        }

        .pie-summary {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .pie-ring {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: conic-gradient(#c2a1ff 0 20%, #9a71eb 20% 60%, #6d49b4 60% 100%);
        }

        .pie-ring-inner {
            width: 74px;
            height: 74px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.94);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--primary-solid);
            text-align: center;
        }

        .pie-ring-value {
            font-size: 16px;
            font-weight: 700;
            line-height: 1;
        }

        .pie-ring-label {
            font-size: 8px;
            margin-top: 2px;
        }

        .pie-legend {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 8px;
            color: #555;
            gap: 8px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot.focused {
            background: var(--primary-solid);
        }

        .dot.idle {
            background: rgba(118, 75, 162, 0.25);
        }

        .pie-recommendation {
            width: 100%;
            background: rgba(118, 75, 162, 0.08);
            border-radius: 10px;
            padding: 8px;
            text-align: center;
        }

        .pie-rec-title {
            font-size: 10px;
            color: #5d3d85;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .pie-rec-message {
            font-size: 8px;
            color: #777;
            line-height: 1.4;
        }

        /* 饼图页面样式 */
        .pie-back {
            display: flex;
            align-items: center;
            font-size: 9px;
            color: #764ba2;
            cursor: pointer;
            margin-bottom: 10px;
            padding-top: 10px;
            padding-left: 10px;
        }

        .pie-back::before {
            content: "◀";
            margin-right: 3px;
        }

        .pie-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-app-region: drag;
        }
        
        .pie-placeholder {
            -webkit-app-region: no-drag;
        }

        .pie-placeholder {
            font-size: 10px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="window-container">
        <div class="content-wrapper" id="contentWrapper">

            <!-- 登录页面 -->
            <div class="page login-page" id="loginPage" style="left: 0;">
                <div class="page-inner">
                    <div class="main-content">

        function formatDate(date) {
            return date.getFullYear() + '年' + (date.getMonth() + 1) + '月' + date.getDate() + '日';
        }

        function formatDateKey(date) {
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${date.getFullYear()}-${month}-${day}`;
        }

        function parseDateKey(dateKey) {
            const [year, month, day] = dateKey.split('-').map(Number);
            return new Date(year, month - 1, day);
        }

        function formatWeekRangeLabel(date) {
            const start = new Date(date);
            const day = start.getDay();
            const offset = day === 0 ? -6 : 1 - day;
            start.setDate(start.getDate() + offset);
            const end = new Date(start);
            end.setDate(start.getDate() + 6);
            return `${start.getMonth() + 1}月${start.getDate()}日 - ${end.getMonth() + 1}月${end.getDate()}日`;
        }

        function getCalendarDateSet() {
            return new Set((currentCalendarIndex.available_dates || []).map(String));
        }

        function getSelectedMonthKey() {
            const yearSelect = document.getElementById('yearSelect');
            const monthSelect = document.getElementById('monthSelect');
            const year = Number(yearSelect?.value || currentDate.getFullYear());
            const month = Number(monthSelect?.value || currentDate.getMonth() + 1);
            return `${year}-${String(month).padStart(2, '0')}`;
        }

        function updateCalendarTitle() {
            const title = document.getElementById('calendarTitle');
            if (!title) return;
            title.textContent = `${currentDate.getFullYear()}年${currentDate.getMonth() + 1}月`;
        }

        function renderMonthCalendar() {
            const container = document.getElementById('monthCalendar');
            if (!container) return;

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1);
            const firstWeekday = firstDay.getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const selectedKey = formatDateKey(currentDate);
            const availableDates = getCalendarDateSet();

            const cells = [];
            for (let i = 0; i < firstWeekday; i++) {
                cells.push('<div class="calendar-cell blank"></div>');
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateObj = new Date(year, month, day);
                const dateKey = formatDateKey(dateObj);
                const hasData = availableDates.has(dateKey);
                const isSelected = dateKey === selectedKey;
                const classes = ['calendar-cell'];
                if (hasData) classes.push('has-data');
                if (isSelected) classes.push('selected');
                if (!hasData) classes.push('disabled');
                const label = day;
                cells.push(`
                    <div class="${classes.join(' ')}" data-date="${dateKey}" ${hasData ? `onclick="selectCalendarDate('${dateKey}')"` : ''}>
                        ${label}
                        ${hasData ? '<span class="dot"></span>' : ''}
                    </div>
                `);
            }

            container.innerHTML = cells.join('');
            updateMonthSelectMarks();
            updateCalendarTitle();
        }

        function updateMonthSelectMarks() {
            const monthSelect = document.getElementById('monthSelect');
            if (!monthSelect) return;
            const year = currentDate.getFullYear();
            const counts = currentCalendarIndex.month_counts || {};

                const count = counts[key] || 0;
                const baseLabel = `${month}月`;
                option.textContent = count > 0 ? `${baseLabel} · ${count}` : baseLabel;
            });
        }

         function renderAiAnalysis(summary) {

        function renderPomodoroCurve(points) {
            const container = document.getElementById('hrvChart');
            if (!points || points.length === 0) {
                container.innerHTML = '（暂无该番茄钟HRV曲线）';
                return;
            }

            const values = points.map(point => point.focus ?? point.value ?? 0);
            const validValues = values.filter(value => value !== null && value !== undefined);
            if (validValues.length === 0) {
                container.innerHTML = '（暂无该番茄钟HRV曲线）';
                return;
            }

            const accent = '#8b63dc';
            const width = 150;
            const height = 72;
            const paddingLeft = 12;
            const paddingRight = 12;
            const paddingTop = 12;
            const paddingBottom = 14;
            const min = Math.min(...validValues);
            const max = Math.max(...validValues);
            const range = max - min || 1;
            const plotWidth = width - paddingLeft - paddingRight;
            const step = points.length > 1 ? plotWidth / (points.length - 1) : 0;
            const coords = points.map((point, index) => {
                const value = Number(point.focus ?? point.value ?? 0);
                const x = paddingLeft + index * step;
                const y = height - paddingBottom - ((value - min) / range) * (height - paddingTop - paddingBottom);
                return { x, y, value, time: point.time || point.label || '' };
            });
            const linePoints = coords.map(point => `${point.x},${point.y}`).join(' ');

            const dotMarkup = coords.map((point) => `
                <g>
                    <circle cx="${point.x}" cy="${point.y}" r="4" fill="${accent}"></circle>
                    <circle cx="${point.x}" cy="${point.y}" r="7" fill="transparent">
                        <title>${point.time}: ${Number(point.value).toFixed(1)}</title>
                    </circle>
                </g>
            `).join('');

            const labelMarkup = coords.map((point, index) => {
                const placeBelow = point.y < paddingTop + 16;
                const labelTop = placeBelow ? point.y + 8 : point.y - 8;
                const labelTransform = placeBelow ? 'translate(-50%, 0)' : 'translate(-50%, -100%)';
                const labelLeft = Math.min(Math.max(point.x, 8), width - 8);
                return `
                    <div
                        class="chart-value-label"
                        style="left:${labelLeft}px; top:${labelTop}px; transform:${labelTransform};"
                    >${Number(point.value).toFixed(1)}</div>
                `;
            }).join('');

            const axisLabels = coords.map((point) => `
                <span class="day-axis-label" style="left:${point.x}px">${point.time}</span>
            `).join('');

            container.innerHTML = `
                <div class="trend-wrap" style="align-items:center; position:relative; width:${width}px; margin:0 auto;">
                    <div class="chart-axis-note" style="width:${width}px; text-align:left;">纵轴：专注评分</div>
                    <svg class="trend-svg" style="width:${width}px; height:${height}px; display:block; margin:0 auto;" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
                        <polyline points="${linePoints}" fill="none" stroke="${accent}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></polyline>
                        ${dotMarkup}
                    </svg>
                    ${labelMarkup}
                    <div class="day-axis" style="width:${width}px; margin:0 auto;">${axisLabels}</div>
                </div>
            `;
        }

        function selectPomodoro(index) {
            if (!currentFocusPeriods || currentFocusPeriods.length === 0) return;
            currentSelectedPomodoroIndex = Math.max(0, Math.min(index, currentFocusPeriods.length - 1));
            const period = currentFocusPeriods[currentSelectedPomodoroIndex];
            document.querySelectorAll('.period-chip').forEach((el, idx) => {
                el.classList.toggle('active', idx === currentSelectedPomodoroIndex);
            });
            updateHrvChartLabel(period);
            renderPomodoroCurve(period.hrv_points || []);
        }

        function renderTrendChart(points) {
            const container = document.getElementById('hrvChart');
            if (!points || points.length === 0) {
                container.innerHTML = '（暂无趋势数据）';
                return;
            }

            const isWeekView = currentTab === 'week';
            if (isWeekView) {
                const values = points.map(point => point.value);
                const validValues = values.filter(value => value !== null && value !== undefined);
                if (validValues.length === 0) {
                    container.innerHTML = '（暂无周趋势数据）';
                    return;
                }

                const width = 170;
                const height = 92;
                const paddingLeft = 8;
                const paddingRight = 24;
                const paddingY = 12;
                const scaleMin = 0;
                const scaleMax = 100;
                const range = scaleMax - scaleMin;
                const plotWidth = width - paddingLeft - paddingRight;
                const stepX = points.length > 1 ? plotWidth / (points.length - 1) : 0;

                const coords = points.map((point, index) => {
                    if (point.value === null || point.value === undefined) return null;
                    const x = paddingLeft + index * stepX;
                    const clampedValue = Math.max(scaleMin, Math.min(scaleMax, point.value));
                    const y = height - paddingY - ((clampedValue - scaleMin) / range) * (height - paddingY * 2);
                    return { x, y };
                });

                const segments = [];
                let currentSegment = [];
                coords.forEach((point) => {
                    if (point) {
                        currentSegment.push(`${point.x},${point.y}`);
                    } else if (currentSegment.length) {
                        if (currentSegment.length > 1) {
                            segments.push(currentSegment.slice());
                        }
                        currentSegment = [];
                    }
                });
                if (currentSegment.length > 1) {
                    segments.push(currentSegment.slice());
                }

                const lineMarkup = segments.map(segment => `
                    <polyline points="${segment.join(' ')}" fill="none" stroke="url(#chartGradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></polyline>
                `).join('');

                const dotMarkup = coords.map((point, index) => {
                    const label = points[index].time || '';
                    if (!point) {
                        return `<circle cx="${paddingLeft + index * stepX}" cy="${height / 2}" r="2.5" fill="#d9ccea" opacity="0.4"></circle>`;
                    }
                    const valueLabel = points[index].value?.toFixed(1) ?? '--';
                    const placeBelow = point.y < paddingY + 16;
                    const labelY = placeBelow ? point.y + 8 : point.y - 8;
                    return `
                        <g>
                            <circle cx="${point.x}" cy="${point.y}" r="4" fill="url(#chartGradient)"></circle>
                            <circle cx="${point.x}" cy="${point.y}" r="6" fill="transparent">
                                <title>${label}: ${points[index].value?.toFixed(2) ?? '--'}</title>
                            </circle>
                        </g>
                    `;
                }).join('');

                const labelMarkup = coords.map((point, index) => {
                    if (!point) return '';
                    const valueLabel = points[index].value?.toFixed(1) ?? '--';
                    const placeBelow = point.y < paddingY + 16;
                    const labelTop = placeBelow ? point.y + 8 : point.y - 8;
                    const labelTransform = placeBelow ? 'translate(-50%, 0)' : 'translate(-50%, -100%)';
                    return `
                        <div
                            class="chart-value-label"
                            style="left:${point.x}px; top:${labelTop}px; transform:${labelTransform};"
                        >${valueLabel}</div>
                    `;
                }).join('');

                const axisLabels = points.map((point, index) => {
                    const x = paddingLeft + index * stepX;
                    return `<span class="week-axis-label" style="left:${x}px">${point.time}</span>`;
                }).join('');

                container.innerHTML = `
                    <div class="trend-wrap trend-wrap-week">
                        <div class="chart-axis-note">纵轴：专注评分</div>
                        <svg class="trend-svg trend-svg-week" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
                            <defs>
                                <linearGradient id="chartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#c6a8ff"></stop>
                                    <stop offset="45%" stop-color="#9a6df0"></stop>
                                    <stop offset="100%" stop-color="#6d49b4"></stop>
                                </linearGradient>
                            </defs>
                            ${lineMarkup}
                            ${dotMarkup}
                        </svg>
                        ${labelMarkup}
                        <div class="trend-axis">${axisLabels}</div>
                        <div class="trend-meta">
                            <span>最低 ${Math.min(...validValues).toFixed(2)}</span>
                            <span>最高 ${Math.max(...validValues).toFixed(2)}</span>
                        </div>
                    </div>
                `;
                return;
            }

            const width = 170;
            const height = 84;
            const paddingLeft = 18;
            const paddingRight = 18;
            const paddingY = 10;
            const scaleMin = Math.min(...points.map(point => point.value ?? point.hrv ?? point.focus ?? point.stress ?? 0));
            const scaleMax = Math.max(...points.map(point => point.value ?? point.hrv ?? point.focus ?? point.stress ?? 0));
            const range = scaleMax - scaleMin || 1;
            const scrollWidth = 720;
            const plotWidth = scrollWidth - paddingLeft - paddingRight;

            function parseClockMinutes(timeText) {
                if (!timeText || typeof timeText !== 'string') return null;
                const match = timeText.match(/(\d{1,2}):(\d{2})/);
                if (!match) return null;
                const hour = Number(match[1]);
                const minute = Number(match[2]);
                if (Number.isNaN(hour) || Number.isNaN(minute)) return null;
                return hour * 60 + minute;
            }

            const coords = points.map((point) => {
                const value = point.value ?? point.hrv ?? point.focus ?? point.stress ?? null;
                const minutes = parseClockMinutes(point.time || point.label || '');
                if (value === null || value === undefined || minutes === null) return null;
                const x = paddingLeft + (minutes / (24 * 60)) * plotWidth;
                const y = height - paddingY - ((value - scaleMin) / range) * (height - paddingY * 2);
                return { x, y, value, time: point.time || point.label || '' };
            });

            const dotMarkup = coords.map((point, index) => {
                const rawPoint = points[index];
                if (!point) {
                    const missingMinutes = parseClockMinutes(rawPoint.time || rawPoint.label || '');
                    const x = missingMinutes === null
                        ? paddingLeft + (index / Math.max(points.length - 1, 1)) * plotWidth
                        : paddingLeft + (missingMinutes / (24 * 60)) * plotWidth;
                    return `
                        <g>
                            <circle cx="${x}" cy="${height / 2 - 2}" r="6.5" fill="rgba(198,168,255,0.25)"></circle>
                            <circle cx="${x}" cy="${height / 2 - 2}" r="9" fill="transparent">
                                <title>暂无数据</title>
                            </circle>
                        </g>
                    `;
                }
                return `
                    <g>
                        <circle cx="${point.x}" cy="${point.y}" r="5" fill="url(#chartGradient)"></circle>
                        <circle cx="${point.x}" cy="${point.y}" r="6" fill="transparent">
                            <title>${rawPoint.time || rawPoint.label || ''}: ${Number(point.value).toFixed(1)}</title>
                        </circle>
                    </g>
                `;
            }).join('');

            const axisTicks = [0, 6, 12, 18, 24].map(hour => {
                const x = paddingLeft + (hour / 24) * plotWidth;
                const label = hour === 24 ? '24:00' : `${String(hour).padStart(2, '0')}:00`;
                return `<span class="day-axis-label" style="left:${x}px">${label}</span>`;
            }).join('');

            container.innerHTML = `
                    <div class="trend-wrap">
                    <div class="chart-axis-note">纵轴：专注评分</div>
                    <div class="trend-scroll-day">
                        <svg class="trend-svg" style="width:${scrollWidth}px; min-width:${scrollWidth}px;" viewBox="0 0 ${scrollWidth} ${height}" preserveAspectRatio="none">
                            <defs>
                                <linearGradient id="chartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#c6a8ff"></stop>
                                    <stop offset="45%" stop-color="#9a6df0"></stop>
                                    <stop offset="100%" stop-color="#6d49b4"></stop>
                                </linearGradient>
                            </defs>
                            ${dotMarkup}
                        </svg>
                        <div class="day-axis" style="width:${scrollWidth}px;">${axisTicks}</div>
                    </div>
                    <div class="trend-meta">
                        <span>最低 ${scaleMin.toFixed(1)}</span>
                        <span>最高 ${scaleMax.toFixed(1)}</span>
                    </div>
                </div>
            `;
        }

        function renderFocusPeriods(periods) {
            const container = document.getElementById('focusPeriods');
            const section = document.getElementById('focusPeriodsSection');
            if (section) {
                section.style.display = currentTab === 'week' ? 'none' : 'block';
            }
            if (currentTab === 'week') {
                currentFocusPeriods = [];
                return;
            }

            if (!periods || periods.length === 0) {
                container.innerHTML = '（暂无专注时段）';
                currentFocusPeriods = [];
                return;
            }

            currentFocusPeriods = periods
                .slice()
                .sort((a, b) => (a.start_time || '').localeCompare(b.start_time || ''));

            const items = currentFocusPeriods.map((period, index) => {
                const statusClass = (period.state || '正常') === '压力过大' ? 'overload' : 'normal';
                return `
                    <button class="period-chip ${statusClass} ${index === currentSelectedPomodoroIndex ? 'active' : ''}" onclick="selectPomodoro(${index})">
                        <div class="period-chip-time">${period.start_time} - ${period.end_time}</div>
                        <div class="period-chip-state">${period.state || '正常'} · 专注 ${Number(period.focus || 0).toFixed(1)} / 压力 ${Number(period.stress || 0).toFixed(1)}</div>
                    </button>
                `;
            }).join('');

            container.innerHTML = `<div class="period-list">${items}</div>`;
        }

        function renderPiePage(summary) {
            const container = document.getElementById('pieContent');
            if (!summary) {
                container.innerHTML = '<div class="pie-placeholder">暂无饼图数据</div>';
                return;
            }

            const total = summary.total_minutes ?? 0;
            const focus = summary.focus_minutes || 0;
            if (total <= 0) {
                container.innerHTML = '<div class="pie-placeholder">暂无可用数据</div>';
                return;
            }
            const focusPercent = Math.max(0, Math.min(100, (focus / total) * 100));
            const otherPercent = 100 - focusPercent;
            const recommendation = summary.recommendation || {};

            container.innerHTML = `
                <div class="pie-summary">
                    <div class="pie-ring" style="background: conic-gradient(#764ba2 0 ${focusPercent}%, rgba(118, 75, 162, 0.15) ${focusPercent}% 100%);">
                        <div class="pie-ring-inner">
                            <div class="pie-ring-value">${focusPercent.toFixed(0)}%</div>
                            <div class="pie-ring-label">专注占比</div>
                        </div>
                    </div>
                    <div class="pie-legend">
                        <div class="legend-item"><span class="dot focused"></span> 专注 ${focus} 分钟</div>
                        <div class="legend-item"><span class="dot idle"></span> 其他 ${Math.max(total - focus, 0)} 分钟</div>
                    </div>
                    <div class="pie-recommendation">
                        <div class="pie-rec-title">${recommendation.state || '正常状态'}</div>
                        <div class="pie-rec-message">${recommendation.message || ''}</div>
                    </div>
                </div>
            `;
        }

        function renderDashboardError(message) {
            currentDashboard = null;
            currentSelectedPomodoroIndex = 0;
            document.getElementById('focusScore').textContent = '--';
            document.getElementById('totalTime').textContent = '--';
            document.getElementById('focusTime').textContent = '--';
            document.getElementById('heartRate').textContent = '--';
            renderAiAnalysis(null);
            document.getElementById('focusPeriods').innerHTML = `（${message || '暂无可用数据'}）`;
            updateHrvChartLabel(null);

        function applyDashboard(summary) {
            currentDashboard = summary;
            document.getElementById('focusScore').textContent = summary.focus_score == null ? '--' : Number(summary.focus_score).toFixed(1);
            document.getElementById('totalTime').textContent = summary.total_minutes == null ? '--' : summary.total_minutes;
            document.getElementById('focusTime').textContent = summary.focus_minutes == null ? '--' : summary.focus_minutes;
            document.getElementById('heartRate').textContent = summary.avg_heart_rate == null ? '--' : Number(summary.avg_heart_rate).toFixed(1);
            syncDailyTaskInput(summary.user_daily_task || currentDailyTask || '');
            syncAiPreferenceInput(summary.user_ai_preference || currentAiPreference || '');
            if (summary.date === formatDateKey(today)) {
                currentTodayPomodoroCount = Number(summary.study_count || 0);
            }
            updatePomodoroHint();
            renderAiAnalysis(summary);
            currentSelectedPomodoroIndex = 0;
            renderFocusPeriods(summary.focus_periods || []);

                updateHrvChartLabel(currentFocusPeriods[0]);
                renderPomodoroCurve(currentFocusPeriods[0].hrv_points || []);
            } else {
                updateHrvChartLabel(null);
                renderTrendChart(summary.trend_points || []);
            }
            renderPiePage(summary);
        }

        async function loadDashboardData(options = {}) {
            const { generateReport = false } = options;
            const dateKey = formatDateKey(currentDate);
            const params = new URLSearchParams();
            if (currentUserId) {
                params.set('user_id', currentUserId);
            }
            params.set('date', dateKey);
            params.set('period', currentTab);
            if (currentTab === 'day' && generateReport) {
                params.set('generate_report', '1');
            }
            const url = `${API_BASE}/daily_dashboard?${params.toString()}`;
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                applyDashboard(data);
                currentRangeLabel = data.range_label || null;
                currentDate = parseDateKey(data.date || dateKey);
                updateDateDisplay();
                return true;
            } catch (error) {
                currentRangeLabel = currentTab === 'week' ? formatWeekRangeLabel(currentDate) : formatDate(currentDate);
                renderDashboardError('每日数据读取失败');
                loadDailyTaskForCurrentDate();
                updateDateDisplay();
                return false;
            }
        }

        async function loadCalendarIndex() {
            const params = new URLSearchParams();
            if (currentUserId) {
                params.set('user_id', currentUserId);
            }
            const url = `${API_BASE}/calendar_index?${params.toString()}`;
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                currentCalendarIndex = await response.json();
                const availableDates = new Set((currentCalendarIndex.available_dates || []).map(String));
                if (currentCalendarIndex.min_date && !availableDates.has(formatDateKey(currentDate))) {
                    currentDate = parseDateKey(currentCalendarIndex.min_date);
                }
                populateYearMonthSelectors();
                renderMonthCalendar();
            } catch (error) {
                currentCalendarIndex = {
                    available_dates: [],
                    available_months: [],
                    month_counts: {},
                    years: [],
                    min_date: null,
                    max_date: null,
                };
                populateYearMonthSelectors();
                renderMonthCalendar();
            }
        }

        function changeDate(delta) {
            const newDate = new Date(currentDate);
            newDate.setDate(newDate.getDate() + (currentTab === 'week' ? delta * 7 : delta));
            currentDate = newDate;
            updateDateDisplay();
            loadDailyTaskForCurrentDate();
            loadDashboardData();
        }

        function populateYearMonthSelectors() {
            const yearSelect = document.getElementById('yearSelect');
            const monthSelect = document.getElementById('monthSelect');
            if (!yearSelect || !monthSelect) return;

            const currentYear = currentDate.getFullYear();
            const currentMonth = currentDate.getMonth() + 1;
            const yearStart = 2010;
            const yearEnd = Math.max(2035, currentYear + 1);

            if (!yearSelect.dataset.ready) {
                yearSelect.innerHTML = '';
                for (let year = yearStart; year <= yearEnd; year++) {
                    const option = document.createElement('option');
                    option.value = String(year);
                    option.textContent = `${year}年`;
                    yearSelect.appendChild(option);
                }
                yearSelect.dataset.ready = '1';
            }

            if (!monthSelect.dataset.ready) {
                monthSelect.innerHTML = '';
                for (let month = 1; month <= 12; month++) {
                    const option = document.createElement('option');
                    option.value = String(month);
                    option.textContent = `${month.toString().padStart(2, '0')}月`;
                    monthSelect.appendChild(option);
                }
                monthSelect.dataset.ready = '1';
            }

            yearSelect.value = String(currentYear);
            monthSelect.value = String(currentMonth);
            updateMonthSelectMarks();
        }

        function syncYearMonthSelectors() {
            populateYearMonthSelectors();
        }

        function changeYearMonth() {
            const yearSelect = document.getElementById('yearSelect');
            const monthSelect = document.getElementById('monthSelect');
            if (!yearSelect || !monthSelect) return;

            const year = Number(yearSelect.value || currentDate.getFullYear());
            const month = Number(monthSelect.value || currentDate.getMonth() + 1);
            const day = currentDate.getDate();
            const maxDay = new Date(year, month, 0).getDate();
            currentDate = new Date(year, month - 1, Math.min(day, maxDay));
            updateDateDisplay();
            loadDailyTaskForCurrentDate();
            loadDashboardData();
        }

        function selectCalendarDate(dateKey) {
            const availableDates = getCalendarDateSet();
            if (!availableDates.has(dateKey)) return;
            currentDate = parseDateKey(dateKey);
            updateDateDisplay();
            loadDailyTaskForCurrentDate();
            loadDashboardData();
        }

            document.getElementById('weekTab').className = 'tab-btn' + (tab === 'week' ? ' active' : '');

                    ipcRenderer.send('quit-app');
                } catch (e) {}
            }
        }

        const POMODORO_TIME = 25 * 60;
        const CIRCLE_RADIUS = 50;
        const CIRCLE_CIRCUMFERENCE = 2 * Math.PI * CIRCLE_RADIUS;

        let timeLeft = POMODORO_TIME;
        let isRunning = false;
        let timerInterval = null;

        const timeDisplay = document.getElementById('timeDisplay');
        const progressCircle = document.getElementById('progressCircle');
        const btnContainer = document.getElementById('btnContainer');
        const status = document.getElementById('status');
        const pomodoroHint = document.getElementById('pomodoroHint');

        progressCircle.style.strokeDasharray = CIRCLE_CIRCUMFERENCE;
        progressCircle.style.strokeDashoffset = 0;

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateDisplay() {
            timeDisplay.textContent = formatTime(timeLeft);
            const progress = timeLeft / POMODORO_TIME;
            const offset = CIRCLE_CIRCUMFERENCE * (1 - progress);
            progressCircle.style.strokeDashoffset = offset;
        }

        function updatePomodoroHint() {
            if (!pomodoroHint) return;
            const completed = Number(currentTodayPomodoroCount || 0);
            const nextIndex = Math.max(1, completed + 1);
            pomodoroHint.textContent = `今天第 ${nextIndex} 个番茄钟`;
        }

        async function loadTodayPomodoroCount() {
            if (!currentUserId) {
                currentTodayPomodoroCount = null;
                updatePomodoroHint();
                return;
            }

            const todayKey = formatDateKey(today);
            const params = new URLSearchParams();
            params.set('user_id', currentUserId);
            params.set('date', todayKey);
            params.set('period', 'day');

            try {
                const response = await fetch(`${API_BASE}/daily_dashboard?${params.toString()}`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                currentTodayPomodoroCount = Number(data.study_count || 0);
            } catch (error) {
                currentTodayPomodoroCount = 0;
            }
            updatePomodoroHint();
        }

        function showRunningButtons() {
            btnContainer.innerHTML = `
                <button class="btn" onclick="pauseTimer()">||</button>
                <button class="btn" onclick="restartTimer()">↺</button>
            `;
        }

        function showPausedButtons() {
            btnContainer.innerHTML = `
                <button class="btn" onclick="resumeTimer()">▶</button>
                <button class="btn" onclick="restartTimer()">↺</button>
            `;
        }

        function showStartButton() {
            btnContainer.innerHTML = `<button class="btn" onclick="toggleTimer()">▶</button>`;
        }

        function toggleTimer() {
            if (timeLeft === 0) timeLeft = POMODORO_TIME;
            isRunning = true;
            const task = '专注';
            status.textContent = `正在${task}...`;
            showRunningButtons();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    isRunning = false;
                    timeLeft = 0;
                    updateDisplay();
                    showStartButton();
                    status.innerHTML = '<span class="completed">🎉 时间到！</span>';
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            status.textContent = '已暂停';
            showPausedButtons();
        }

        function resumeTimer() {
            isRunning = true;
            const task = '专注';
            status.textContent = `正在${task}...`;
            showRunningButtons();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    isRunning = false;
                    timeLeft = 0;
                    updateDisplay();
                    showStartButton();
                    status.innerHTML = '<span class="completed">🎉 时间到！</span>';
                }
            }, 1000);
        }

        function restartTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            timeLeft = POMODORO_TIME;
            updateDisplay();
            showStartButton();
            status.textContent = '点击开始专注';
            updatePomodoroHint();
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            timeLeft = POMODORO_TIME;
            updateDisplay();
            showStartButton();
            status.textContent = '点击开始专注';
            updatePomodoroHint();
        }

        updateDisplay();
        handleResize();
        populateYearMonthSelectors();

            loadAiPreferenceForCurrentUser();
            updateAiTitle();
            loadCalendarIndex().then(loadDashboardData);
        } else {
            showLoginPage();
            loadLoginUserList();

                    throw new Error(`HTTP ${response.status}`);
                }

                    select.value = users[0];

                select.innerHTML = '<option value="">暂无用户</option>';
            }

            if (input && input.value !== currentAiPreference) {
                input.value = currentAiPreference;
            }

                hint.textContent = currentAiPreference
                    ? '这句话会跟着当前用户一起记住'
                    : '会记住当前用户的偏好';

            const hint = document.getElementById('aiPreferenceHint');
            if (!input || !currentUserId) {
                syncAiPreferenceInput('');
                return;
            }

            try {
                const params = new URLSearchParams();
                params.set('user_id', currentUserId);
                const response = await fetch(`${API_BASE}/user_ai_preference?${params.toString()}`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);

                syncDailyTaskInput(data.task_text || '');

                if (hint) {

        function handleDailyTaskInput() {
            const input = document.getElementById('dailyTaskInput');
            if (!input) return;
            currentDailyTask = input.value || '';
            const hint = document.getElementById('dailyTaskHint');
            if (hint) {
                hint.textContent = currentDailyTask
                    ? '正在保存这一天的任务'
                    : '会和今天的分析一起记住';
            }

            setDailyReportReady(false);
            currentDailyReportGenerating = false;
            updateGenerateReportButton(false);

            if (!currentUserId) return;
            if (dailyTaskSaveTimer) {
                clearTimeout(dailyTaskSaveTimer);
            }
            dailyTaskSaveTimer = setTimeout(() => {
                saveDailyTask(currentDailyTask, { refreshDashboard: false });
            }, 500);
        }

        async function saveDailyTask(taskText, options = {}) {
            const { refreshDashboard = true } = options;
            if (!currentUserId) return;
            try {
                const response = await fetch(`${API_BASE}/user_daily_task`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: currentUserId,
                        task_date: formatDateKey(currentDate),
                        task_text: taskText || '',
                    }),
                });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const hint = document.getElementById('dailyTaskHint');
                if (hint) {
                    hint.textContent = taskText
                        ? '已记住这一天的任务'
                        : '会和今天的分析一起记住';
                }
                if (refreshDashboard) {
                    loadDashboardData();
                }
            } catch (error) {
                const hint = document.getElementById('dailyTaskHint');
                if (hint) {
                    hint.textContent = '保存失败了，但还能继续用';
                }
            }
        }

        async function generateDailyReport() {
            if (!currentUserId) return;
            const taskText = (currentDailyTask || '').trim();
            if (!taskText) {
                const hint = document.getElementById('dailyTaskHint');
                if (hint) {
                    hint.textContent = '先写今天任务，再点生成每日报告';
                }
                return;
            }

            currentDailyReportGenerating = true;
            updateGenerateReportButton(true);
            setDailyReportReady(false);

            try {
                // Yield one frame so the disabled style/text can paint before network work starts.
                await new Promise(resolve => requestAnimationFrame(resolve));
                await saveDailyTask(taskText, { refreshDashboard: false });
                const success = await loadDashboardData({ generateReport: true });
                setDailyReportReady(!!success);
            } finally {
                currentDailyReportGenerating = false;
                updateGenerateReportButton(false);
            }
        }

        function handleAiPreferenceInput() {
            const input = document.getElementById('aiPreferenceInput');
            if (!input) return;
            currentAiPreference = input.value || '';
            const hint = document.getElementById('aiPreferenceHint');
            if (hint) {
                hint.textContent = currentAiPreference
                    ? '正在保存这句话到当前用户'
                    : '会记住当前用户的偏好';
            }

            if (!currentUserId) return;
            if (aiPreferenceSaveTimer) {
                clearTimeout(aiPreferenceSaveTimer);
            }
            aiPreferenceSaveTimer = setTimeout(() => {
                saveAiPreference(currentAiPreference);
            }, 500);
        }

        function handleAiPreferenceKeydown(event) {
            if (!event) return;
            if (event.key !== 'Enter' || event.shiftKey) {
                return;
            }

            event.preventDefault();
            const input = document.getElementById('aiPreferenceInput');
            if (!input) return;

            const preferenceText = input.value || '';
            if (aiPreferenceSaveTimer) {
                clearTimeout(aiPreferenceSaveTimer);
                aiPreferenceSaveTimer = null;
            }

            saveAiPreference(preferenceText);
            input.value = '';
            currentAiPreference = '';
            const hint = document.getElementById('aiPreferenceHint');
            if (hint) {
                hint.textContent = preferenceText
                    ? '已记住当前用户的偏好'
                    : '会记住当前用户的偏好';
            }
            closeAiPreferencePanel();
        }

        async function saveAiPreference(preferenceText) {
            if (!currentUserId) return;
            try {
                const response = await fetch(`${API_BASE}/user_ai_preference`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: currentUserId,
                        preference_text: preferenceText || '',
                    }),
                });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const hint = document.getElementById('aiPreferenceHint');
                if (hint) {
                    hint.textContent = preferenceText
                        ? '已记住当前用户的这句话'
                        : '会记住当前用户的偏好';
                }
            } catch (error) {
                const hint = document.getElementById('aiPreferenceHint');
                if (hint) {
                    hint.textContent = '保存失败了，但还能继续用';
                }
            }
        }

        if (typeof require !== 'undefined') {
            try {
                const { ipcRenderer } = require('electron');
                ipcRenderer.on('reset-timer', () => resetTimer());
            } catch (e) {}
        }
    </script>
</body>
</html>
